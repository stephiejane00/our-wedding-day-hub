<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages | Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#1A1A16;--ink-mid:#4A4A44;--ink-muted:#8A8A82;--ink-ghost:#C0C0B8;--ink-rule:#DDDDD8;--cream:#FAFAF8;--cream-warm:#F4F0EA;--cream-deep:#EDE8E0;--gold:#9A7A5A;--gold-light:#C4A882;--font-serif:'Cormorant Garamond',Georgia,serif;--font-sans:'Plus Jakarta Sans','Helvetica Neue',Arial,sans-serif}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{background:var(--cream);font-family:var(--font-sans);color:var(--ink);-webkit-font-smoothing:antialiased}
    .site-topbar{background:var(--cream);border-bottom:1px solid var(--ink-rule);padding:0 36px;display:flex;align-items:center;gap:20px;min-height:64px;position:sticky;top:0;z-index:200}.site-topbar-logo-wrap{display:inline-flex;align-items:center}.site-topbar-logo{width:44px;height:44px;object-fit:contain}.site-topbar-title{flex:1}.site-topbar-title h1{font-family:var(--font-serif);font-size:1.05rem;font-weight:400;letter-spacing:.01em;color:var(--ink)}.site-topbar-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.site-topbar-link,.site-topbar-btn{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:6px 14px;font-family:var(--font-sans);font-size:.75rem;letter-spacing:.06em;text-decoration:none;white-space:nowrap;transition:all .2s ease}.site-topbar-link{color:var(--ink-muted);border:none;background:none}.site-topbar-link:hover{color:var(--ink)}.site-topbar-btn{background:var(--ink);color:var(--cream);font-weight:600;border:none;cursor:pointer}.site-topbar-btn:hover{background:var(--ink-mid)}
    .messages-layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 64px);overflow:hidden;border-top:1px solid var(--ink-rule)}
    .conversations-panel{border-right:1px solid var(--ink-rule);overflow-y:auto;display:flex;flex-direction:column;background:var(--cream)}
    .conversations-header{padding:18px 20px 14px;border-bottom:1px solid var(--ink-rule);display:flex;align-items:center;justify-content:space-between;background:var(--cream);position:sticky;top:0;z-index:2}
    .conversations-header h2{font-family:var(--font-serif);font-size:1.1rem;font-weight:300;color:var(--ink)}
    #conversationsList{flex:1}
    .conv-item{padding:14px 18px;border-bottom:.5px solid var(--ink-rule);cursor:pointer;transition:background .15s;display:flex;flex-direction:column;gap:3px}
    .conv-item:hover{background:var(--cream-warm)}.conv-item.active{background:var(--cream-deep)}
    .conv-name{font-family:var(--font-sans);font-size:.8rem;font-weight:700;color:var(--ink);display:flex;align-items:center;justify-content:space-between}
    .conv-preview{font-family:var(--font-sans);font-size:.74rem;color:var(--ink-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
    .conv-time{font-family:var(--font-sans);font-size:.68rem;color:var(--ink-ghost)}
    .unread-badge{background:var(--ink);color:var(--cream);font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:999px;min-width:18px;text-align:center;line-height:1.4}
    .conv-empty{padding:32px 20px;text-align:center;font-family:var(--font-sans);font-size:.82rem;color:var(--ink-muted);line-height:1.7}
    .thread-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--cream)}
    .thread-header{padding:14px 22px;border-bottom:1px solid var(--ink-rule);background:var(--cream);position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:14px}
    .thread-header-info{flex:1}
    .thread-title{font-family:var(--font-serif);font-size:1.1rem;font-weight:300;color:var(--ink)}
    .thread-subtitle{font-family:var(--font-sans);font-size:.72rem;color:var(--ink-muted)}
    #messagesThread{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:12px}
    .msg-bubble{max-width:72%;padding:10px 14px;font-family:var(--font-sans);font-size:.84rem;line-height:1.65;color:var(--ink)}
    .msg-bubble.mine{background:var(--ink);color:var(--cream);align-self:flex-end}
    .msg-bubble.theirs{background:var(--cream-warm);align-self:flex-start}
    .msg-meta{font-family:var(--font-sans);font-size:.64rem;color:var(--ink-ghost);margin-top:4px;text-align:right}
    .msg-bubble.theirs .msg-meta{text-align:left}
    .thread-compose{padding:14px 22px;border-top:1px solid var(--ink-rule);background:var(--cream);display:flex;gap:10px;align-items:flex-end}
    .thread-compose textarea{flex:1;border:.5px solid var(--ink-rule);border-radius:0;padding:10px 13px;font-family:var(--font-sans);font-size:.86rem;color:var(--ink);resize:none;min-height:44px;max-height:140px;outline:none;transition:border-color .2s;background:var(--cream)}
    .thread-compose textarea:focus{border-color:var(--gold)}
    .send-btn{min-height:44px;padding:10px 18px;border:none;background:var(--ink);color:var(--cream);font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s;white-space:nowrap}
    .send-btn:hover{background:var(--ink-mid)}
    .thread-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:40px;text-align:center;color:var(--ink-muted)}
    .thread-empty p{font-family:var(--font-sans);font-size:.86rem;line-height:1.75;max-width:340px}
    .thread-empty-title{font-family:var(--font-serif);font-size:1.5rem;font-weight:300;color:var(--ink);margin-bottom:10px}
    .auth-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;height:calc(100vh - 64px);padding:40px;text-align:center;border-top:1px solid var(--ink-rule)}
    .auth-gate h2{font-family:var(--font-serif);font-size:1.8rem;font-weight:300;color:var(--ink);margin-bottom:10px}
    .auth-gate p{font-family:var(--font-sans);font-size:.88rem;color:var(--ink-muted);line-height:1.75;margin-bottom:24px;max-width:360px}
    .auth-gate-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
    .btn-ink{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:10px 22px;font-family:var(--font-sans);font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--cream);background:var(--ink);text-decoration:none;border:none;cursor:pointer;transition:background .2s}.btn-ink:hover{background:var(--ink-mid)}
    .btn-outline{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:10px 22px;font-family:var(--font-sans);font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);background:none;text-decoration:none;border:.5px solid var(--ink-rule);transition:all .2s}.btn-outline:hover{background:var(--cream-warm);border-color:var(--ink-muted)}
    .loading-state{padding:32px 20px;text-align:center;font-family:var(--font-sans);font-size:.82rem;color:var(--ink-muted)}
    @media(max-width:700px){.site-topbar{padding:0 16px;min-height:56px;position:relative}.messages-layout{grid-template-columns:1fr;height:auto}.conversations-panel{height:auto;border-right:none;border-bottom:1px solid var(--ink-rule)}.thread-panel{min-height:60vh}}
    .nav-links{display:flex;align-items:center;gap:8px}.mobile-menu-btn{display:none;background:none;border:none;color:var(--ink);font-size:1.5rem;cursor:pointer;padding:4px}
    @media(max-width:700px){.site-topbar{padding:0 16px !important;min-height:56px !important;position:relative !important}.mobile-menu-btn{display:inline-flex;align-items:center;justify-content:center}.nav-links{display:none}.nav-links.active{display:flex;flex-direction:column;position:absolute;top:56px;right:12px;background:rgba(250,250,248,.97);backdrop-filter:blur(14px);border:1px solid var(--ink-rule);padding:22px;gap:18px;min-width:230px;z-index:999;box-shadow:0 18px 45px rgba(0,0,0,.08)}.nav-links.active a,.nav-links.active button{justify-content:flex-start;width:100%;padding:10px 0;border-bottom:1px solid var(--ink-rule);background:none !important;color:var(--ink) !important;font-size:.76rem;letter-spacing:.12em}.nav-links.active a:last-child,.nav-links.active button:last-child{border-bottom:none}}
  </style>
</head>
<body>
<div id="siteNav"></div>

<div id="authGate" class="auth-gate" style="display:none;">
  <h2>Your messages</h2>
  <p>Log in to view your conversations with vendors and couples.</p>
  <div class="auth-gate-actions">
    <a href="login.html" class="btn-ink">Log In &#8594;</a>
    <a href="signup.html" class="btn-outline">Create Account</a>
  </div>
</div>

<div id="messagesApp" class="messages-layout" style="display:none;">
  <div class="conversations-panel">
    <div class="conversations-header"><h2>Messages</h2></div>
    <div id="conversationsList"><div class="loading-state">Loading&#8230;</div></div>
  </div>
  <div class="thread-panel" id="threadPanel">
    <div class="thread-empty" id="threadEmpty">
      <p class="thread-empty-title">Select a conversation</p>
      <p>Choose a conversation from the left to view your messages.</p>
    </div>
    <div id="threadView" style="display:none;flex-direction:column;height:100%;overflow:hidden;">
      <div class="thread-header">
        <div class="thread-header-info">
          <div class="thread-title" id="threadTitle"></div>
          <div class="thread-subtitle" id="threadSubtitle"></div>
        </div>
      </div>
      <div id="messagesThread"></div>
      <div class="thread-compose">
        <textarea id="replyBody" placeholder="Write a message&#8230;" rows="1"></textarea>
        <button type="button" class="send-btn" id="sendReplyBtn">Send</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
import {
  auth, db, onAuthStateChanged,
  collection, query, where, orderBy,
  onSnapshot, addDoc, updateDoc, doc,
  serverTimestamp, increment, getDocs, getDoc
} from './firebase.js';

let currentUser = null;
let currentConvId = null;
let messagesUnsub = null;
let convsUnsub = null;
let _isVendorCache = null;

// ── Determine vendor/couple role from users collection ──
async function getIsVendor() {
  if (_isVendorCache !== null) return _isVendorCache;
  if (!currentUser) return false;
  try {
    const userSnap = await getDoc(doc(db, 'users', currentUser.uid));
    if (userSnap.exists()) {
      _isVendorCache = userSnap.data().role === 'vendor';
      return _isVendorCache;
    }
    // Fallback: check vendors collection directly
    const vendorSnap = await getDocs(query(collection(db, 'vendors'), where('uid', '==', currentUser.uid)));
    _isVendorCache = !vendorSnap.empty;
    return _isVendorCache;
  } catch (e) {
    console.error('Role check error:', e);
    _isVendorCache = false;
    return false;
  }
}

onAuthStateChanged(auth, async function(user) {
  if (!user) {
    document.getElementById('authGate').style.display = 'flex';
    document.getElementById('messagesApp').style.display = 'none';
    return;
  }
  currentUser = user;
  _isVendorCache = null; // reset on new auth
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('messagesApp').style.display = 'grid';

  try {
    await loadConversations();
  } catch (e) {
    console.error('Messages init error:', e);
    document.getElementById('conversationsList').innerHTML =
      '<div class="conv-empty">Could not load messages. Please refresh.</div>';
  }
});

async function loadConversations() {
  const isVend = await getIsVendor();
  const userField = isVend ? 'vendorId' : 'coupleId';

  if (convsUnsub) convsUnsub();

  const q = query(
    collection(db, 'conversations'),
    where(userField, '==', currentUser.uid),
    orderBy('lastMessageAt', 'desc')
  );

  convsUnsub = onSnapshot(q, function(snap) {
    const list = document.getElementById('conversationsList');
    if (snap.empty) {
      list.innerHTML = '<div class="conv-empty">No conversations yet.<br>Message a vendor from their profile to get started &#9825;</div>';
      return;
    }
    list.innerHTML = '';
    snap.forEach(function(d) {
      var conv = d.data();
      var otherName = isVend ? (conv.coupleName || 'Couple') : (conv.vendorName || 'Vendor');
      var unread = isVend ? (conv.vendorUnread || 0) : (conv.coupleUnread || 0);
      var lastMsg = conv.lastMessage || '';
      var lastTime = '';
      if (conv.lastMessageAt) {
        try {
          lastTime = new Date(conv.lastMessageAt.toDate()).toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
        } catch(e) { lastTime = ''; }
      }
      var item = document.createElement('div');
      item.className = 'conv-item' + (d.id === currentConvId ? ' active' : '');
      item.innerHTML =
        '<div class="conv-name">' + otherName +
          '<span>' + (unread > 0 ? '<span class="unread-badge">' + unread + '</span>' : '') + '</span>' +
        '</div>' +
        '<div class="conv-preview">' + lastMsg + '</div>' +
        '<div class="conv-time">' + lastTime + '</div>';
      item.addEventListener('click', function() { openConversation(d.id, conv, item, isVend); });
      list.appendChild(item);
    });
  }, function(err) {
    console.error('Conversations snapshot error:', err);
    document.getElementById('conversationsList').innerHTML =
      '<div class="conv-empty">Could not load conversations.</div>';
  });
}

function openConversation(convId, conv, itemEl, isVend) {
  currentConvId = convId;
  document.querySelectorAll('.conv-item').forEach(function(el) { el.classList.remove('active'); });
  itemEl.classList.add('active');

  document.getElementById('threadEmpty').style.display = 'none';
  var tv = document.getElementById('threadView');
  tv.style.display = 'flex';

  var otherName = isVend ? (conv.coupleName || 'Couple') : (conv.vendorName || 'Vendor');
  var subtitle = isVend ? (conv.coupleEmail || '') : (conv.vendorName || '');
  document.getElementById('threadTitle').textContent = otherName;
  document.getElementById('threadSubtitle').textContent = subtitle;

  // Mark as read
  var unreadField = isVend ? 'vendorUnread' : 'coupleUnread';
  updateDoc(doc(db, 'conversations', convId), { [unreadField]: 0 }).catch(function(e) {
    console.warn('Could not mark as read:', e);
  });

  // Subscribe to messages
  if (messagesUnsub) messagesUnsub();
  var mq = query(
    collection(db, 'conversations', convId, 'messages'),
    orderBy('sentAt', 'asc')
  );
  messagesUnsub = onSnapshot(mq, function(snap) {
    var thread = document.getElementById('messagesThread');
    thread.innerHTML = '';
    snap.forEach(function(md) {
      var m = md.data();
      var mine = m.senderId === currentUser.uid;
      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble ' + (mine ? 'mine' : 'theirs');
      var time = '';
      if (m.sentAt) {
        try {
          time = new Date(m.sentAt.toDate()).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' });
        } catch(e) { time = ''; }
      }
      bubble.innerHTML = '<div>' + (m.body || '') + '</div><div class="msg-meta">' + time + '</div>';
      thread.appendChild(bubble);
    });
    thread.scrollTop = thread.scrollHeight;
  }, function(err) {
    console.error('Messages thread error:', err);
  });
}

document.getElementById('sendReplyBtn').addEventListener('click', async function() {
  if (!currentConvId || !currentUser) return;
  var body = document.getElementById('replyBody').value.trim();
  if (!body) return;

  var isVend = await getIsVendor();
  var otherUnread = isVend ? 'coupleUnread' : 'vendorUnread';

  try {
    await addDoc(collection(db, 'conversations', currentConvId, 'messages'), {
      senderId: currentUser.uid,
      senderName: currentUser.displayName || currentUser.email || '',
      body: body,
      sentAt: serverTimestamp(),
      read: false
    });
    await updateDoc(doc(db, 'conversations', currentConvId), {
      lastMessage: body,
      lastMessageAt: serverTimestamp(),
      [otherUnread]: increment(1)
    });
    document.getElementById('replyBody').value = '';
  } catch (e) {
    console.error('Send error:', e);
  }
});

// Send on Enter (Shift+Enter for new line)
document.getElementById('replyBody').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('sendReplyBtn').click();
  }
});
</script>
<script type="module" src="nav.js"></script>
</body>
</html>
