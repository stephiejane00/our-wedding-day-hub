<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Profile | Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  background: #fffaf6;
  color: #2f2a26;
}

/* TOP RIGHT AUTH AREA */
.page-auth {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 10px;
  padding: 14px 20px 0;
  max-width: 1200px;
  margin: 0 auto;
  flex-wrap: wrap;
}

/* ALL BUTTON STYLING (JOIN STYLE) */
.auth-pill,
.btn-primary,
.favorite-btn {
  background: #b07c6d;
  color: white;
  padding: 10px 18px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  font-family: inherit;
  text-decoration: none;
  font-size: 0.92rem;
}

.auth-pill:hover,
.btn-primary:hover,
.favorite-btn:hover {
  background: #9b685a;
}

/* SECONDARY BUTTONS */
.btn-secondary {
  background: #f7efe9;
  color: #7d5b4f;
  padding: 10px 18px;
  border-radius: 999px;
  text-decoration: none;
}

.btn-secondary:hover {
  background: #efe2d8;
}

/* HEART ACTIVE */
.favorite-btn.active {
  background: #d88fa3;
}

/* NAV */
.top-nav {
  display: flex;
  justify-content: center;
  gap: 24px;
  padding: 16px;
  background: #fff;
  border-bottom: 1px solid #eadfd6;
}

.top-nav a {
  text-decoration: none;
  color: #2f2a26;
}

.hero {
  text-align: center;
  padding: 10px;
}

.header-image {
  max-width: 420px;
  width: 100%;
}

/* CARD */
.vendor-card {
  max-width: 1000px;
  margin: 40px auto;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid #eadfd6;
}

.vendor-cover {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.vendor-content {
  padding: 30px;
}

.vendor-header {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
}

.meta-pill {
  background: #f7efe9;
  padding: 6px 12px;
  border-radius: 999px;
  margin-right: 8px;
}

/* CONTACT */
.contact-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

/* GALLERY */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 10px;
}

.gallery-grid img {
  width: 100%;
  border-radius: 12px;
}

footer {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<!-- AUTH BUTTONS -->
<div class="page-auth">
  <a href="index.html" class="auth-pill">Home</a>
  <a href="dashboard.html" class="auth-pill">Dashboard</a>

  <a href="signup.html" class="auth-pill">Join</a>
  <a href="login.html">Log In</a>
  <button id="logoutLink" class="auth-pill">Log Out</button>
</div>

<!-- NAV -->
<nav class="top-nav">
  <a href="vendors.html">Browse Vendors</a>
  <a href="pricing.html">Pricing</a>
</nav>

<header class="hero">
  <img src="images/header4.png" class="header-image">
</header>

<main>
  <section class="vendor-card">

    <img id="vendorCover" class="vendor-cover" src="images/default-cover.jpg">

    <div class="vendor-content">

      <div class="vendor-header">
        <div>
          <h1 id="businessName">Vendor Name</h1>
          <span class="meta-pill" id="vendorCategory">Category</span>
          <span class="meta-pill" id="vendorLocation">Location</span>
        </div>

        <button id="favoriteBtn" class="favorite-btn">
          ♡ Save
        </button>
      </div>

      <h2>About</h2>
      <p id="vendorBio"></p>

      <h2>Contact</h2>
      <div class="contact-buttons">
        <a id="emailBtn" class="btn-primary">Email</a>
        <a id="instagramBtn" class="btn-primary">Instagram</a>
        <a id="websiteBtn" class="btn-primary">Website</a>
      </div>

      <h2>Gallery</h2>
      <div class="gallery-grid">
        <img id="g1">
        <img id="g2">
        <img id="g3">
      </div>

    </div>
  </section>
</main>

<footer>
  © Our Wedding Day Hub | ABN: 76688637041
</footer>

<script>
const vendorId = "demo";

/* FAVORITES */
const btn = document.getElementById("favoriteBtn");

function getFavs() {
  return JSON.parse(localStorage.getItem("favs")) || [];
}

function setFavs(f) {
  localStorage.setItem("favs", JSON.stringify(f));
}

function updateBtn() {
  const favs = getFavs();
  if (favs.includes(vendorId)) {
    btn.classList.add("active");
    btn.innerHTML = "♥ Saved";
  } else {
    btn.classList.remove("active");
    btn.innerHTML = "♡ Save";
  }
}

btn.onclick = () => {
  let favs = getFavs();
  if (favs.includes(vendorId)) {
    favs = favs.filter(x => x !== vendorId);
  } else {
    favs.push(vendorId);
  }
  setFavs(favs);
  updateBtn();
};

updateBtn();

/* DEMO DATA */
const vendor = {
  name: "Kaity Kissed Nails & Designs",
  category: "Beauty",
  location: "Brisbane",
  bio: "Soft, elegant bridal nails tailored to your day.",
  email: "hello@email.com",
  instagram: "#",
  website: "#",
  images: [
    "images/placeholder1.jpg",
    "images/placeholder2.jpg",
    "images/placeholder3.jpg"
  ]
};

document.getElementById("businessName").innerText = vendor.name;
document.getElementById("vendorCategory").innerText = vendor.category;
document.getElementById("vendorLocation").innerText = vendor.location;
document.getElementById("vendorBio").innerText = vendor.bio;

document.getElementById("emailBtn").href = "mailto:" + vendor.email;
document.getElementById("instagramBtn").href = vendor.instagram;
document.getElementById("websiteBtn").href = vendor.website;

document.getElementById("g1").src = vendor.images[0];
document.getElementById("g2").src = vendor.images[1];
document.getElementById("g3").src = vendor.images[2];
</script>

</body>
</html>
