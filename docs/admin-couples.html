<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Couples | Our Wedding Day Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:        #1A1A16;
      --ink-mid:    #4A4A44;
      --ink-muted:  #8A8A82;
      --ink-ghost:  #C0C0B8;
      --ink-rule:   #DDDDD8;
      --cream:      #FAFAF8;
      --cream-warm: #F4F0EA;
      --cream-deep: #EDE8E0;
      --gold:       #9A7A5A;
      --gold-light: #C4A882;
      --danger:     #8B3A3A;
      --danger-bg:  #F0E8E8;
      --success:    #3A5E38;
      --success-bg: #E8F0E8;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans:  'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); font-family: var(--font-sans); color: var(--ink); -webkit-font-smoothing: antialiased; min-height: 100vh; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* ── TOPBAR ── */
    .admin-topbar {
      background: var(--ink); border-bottom: 1px solid var(--ink-mid);
      padding: 0 40px; display: flex; align-items: center; gap: 16px;
      min-height: 60px; position: sticky; top: 0; z-index: 200;
    }
    .admin-topbar-logo { width: 36px; height: 36px; object-fit: contain; opacity: 0.7; }
    .admin-topbar-title { font-family: var(--font-serif); font-size: 1rem; font-weight: 400; color: var(--cream); opacity: 0.7; flex: 1; }
    .admin-topbar-badge { font-family: var(--font-sans); font-size: 0.62rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; background: var(--gold); color: var(--cream); padding: 4px 10px; }
    .admin-topbar-links { display: flex; gap: 0; margin-left: 16px; }
    .admin-topbar-link { font-family: var(--font-sans); font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 12px; color: var(--ink-muted); text-decoration: none; border-left: 1px solid var(--ink-mid); transition: color 0.2s; }
    .admin-topbar-link:hover { color: var(--cream); }

    /* ── PAGE ── */
    .admin-page { max-width: 1200px; margin: 0 auto; padding: 0 40px 80px; }

    /* ── HERO ── */
    .admin-hero { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 24px; padding: 40px 0 32px; border-bottom: 1px solid var(--ink-rule); }
    .admin-hero-eyebrow { font-family: var(--font-sans); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-ghost); margin-bottom: 8px; }
    .admin-hero-title { font-family: var(--font-serif); font-size: clamp(2.4rem, 4vw, 3.6rem); font-weight: 300; line-height: 0.97; letter-spacing: -0.04em; color: var(--ink); margin-bottom: 8px; }
    .admin-hero-sub { font-family: var(--font-sans); font-size: 0.86rem; color: var(--ink-muted); line-height: 1.7; }
    .admin-status { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border: 0.5px solid var(--ink-rule); font-family: var(--font-sans); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; white-space: nowrap; }
    .admin-status.ok  { background: var(--success-bg); color: var(--success); border-color: #C8DCC8; }
    .admin-status.err { background: var(--danger-bg); color: var(--danger); border-color: #DCC8C8; }
    .admin-status::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* ── SEARCH BAR ── */
    .admin-search-row { display: flex; gap: 12px; align-items: center; padding: 28px 0 0; margin-bottom: 0; }
    .admin-search-input { flex: 1; max-width: 440px; border: none; border-bottom: 1px solid var(--ink-rule); border-radius: 0; background: transparent; padding: 12px 0; font-family: var(--font-sans); font-size: 0.9rem; color: var(--ink); outline: none; transition: border-color 0.2s; }
    .admin-search-input:focus { border-color: var(--gold); }
    .admin-search-input::placeholder { color: var(--ink-ghost); }
    .admin-msg { font-family: var(--font-sans); font-size: 0.78rem; color: var(--ink-muted); margin: 10px 0 0; min-height: 1.2em; }

    /* ── BUTTONS ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 38px; padding: 9px 18px; border: none; font-family: var(--font-sans); font-weight: 700; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: var(--ink); color: var(--cream); }
    .btn-primary:hover { background: var(--ink-mid); }
    .btn-secondary { background: var(--cream-warm); color: var(--ink); border: 0.5px solid var(--ink-rule); }
    .btn-secondary:hover { background: var(--cream-deep); }
    .btn-danger { background: var(--danger-bg); color: var(--danger); border: 0.5px solid #DCC8C8; }
    .btn-danger:hover { background: #E8D8D8; }
    .btn-sm { min-height: 32px; padding: 6px 14px; font-size: 0.65rem; }

    /* ── COUPLE LIST ── */
    .couples-list { display: grid; gap: 0; background: var(--ink-rule); margin-top: 20px; border: 0.5px solid var(--ink-rule); }

    /* ── COUPLE CARD ── */
    .couple-card { background: var(--cream); border-bottom: 0.5px solid var(--ink-rule); }
    .couple-card:last-child { border-bottom: none; }

    .couple-card-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 22px; cursor: pointer; transition: background 0.15s; user-select: none; }
    .couple-card-header:hover { background: var(--cream-warm); }
    .couple-card-header.open { background: var(--cream-warm); }

    .couple-card-header-left { display: flex; align-items: center; gap: 14px; }
    .couple-card-icon { width: 36px; height: 36px; background: var(--cream-deep); border: 0.5px solid var(--ink-rule); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; color: var(--ink-muted); flex-shrink: 0; }
    .couple-card-name { font-family: var(--font-serif); font-size: 1.2rem; font-weight: 300; letter-spacing: -0.01em; color: var(--ink); margin: 0 0 2px; }
    .couple-card-meta { font-family: var(--font-sans); font-size: 0.74rem; color: var(--ink-ghost); margin: 0; }

    .couple-status-pill { display: inline-flex; align-items: center; padding: 4px 10px; font-family: var(--font-sans); font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: var(--cream-deep); color: var(--ink-muted); border: 0.5px solid var(--ink-rule); white-space: nowrap; }
    .couple-status-pill.active { background: var(--success-bg); color: var(--success); border-color: #C8DCC8; }

    .couple-chevron { width: 24px; height: 24px; border: 0.5px solid var(--ink-rule); display: flex; align-items: center; justify-content: center; color: var(--ink-muted); flex-shrink: 0; transition: background 0.15s; }
    .couple-chevron svg { transition: transform 0.25s; }
    .couple-card-header.open .couple-chevron svg { transform: rotate(180deg); }

    .couple-card-body { display: none; padding: 0 22px 22px; border-top: 0.5px solid var(--ink-rule); }
    .couple-card-body.open { display: block; }

    /* ── FORM GRID ── */
    .couple-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 28px; margin-top: 20px; }
    .couple-form-field { display: flex; flex-direction: column; }
    .couple-form-field.full { grid-column: 1 / -1; }
    .couple-form-field label { font-family: var(--font-sans); font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 7px; }
    .couple-form-field input, .couple-form-field select, .couple-form-field textarea { width: 100%; border: none; border-bottom: 1px solid var(--ink-rule); border-radius: 0; background: transparent; padding: 11px 0; font-family: var(--font-sans); font-size: 0.9rem; color: var(--ink); outline: none; transition: border-color 0.2s; box-sizing: border-box; }
    .couple-form-field input:focus, .couple-form-field select:focus, .couple-form-field textarea:focus { border-color: var(--gold); background: rgba(154,122,90,0.03); }
    .couple-form-field textarea { min-height: 90px; resize: vertical; }

    .couple-btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; padding-top: 16px; border-top: 0.5px solid var(--ink-rule); }

    /* ── EMPTY ── */
    .admin-empty { padding: 32px; text-align: center; font-family: var(--font-serif); font-style: italic; font-size: 1.1rem; color: var(--ink-muted); background: var(--cream-warm); border: 0.5px solid var(--ink-rule); }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .admin-topbar { padding: 0 20px; }
      .admin-page { padding: 0 20px 60px; }
      .admin-hero { grid-template-columns: 1fr; gap: 14px; }
      .couple-form-grid { grid-template-columns: 1fr; }
      .couple-form-field.full { grid-column: 1; }
    }
  </style>
</head>
<body>

<!-- ── TOPBAR ── -->
<header class="admin-topbar">
  <img src="images/logo1.png" alt="Our Wedding Day Hub" class="admin-topbar-logo">
  <span class="admin-topbar-title">Our Wedding Day Hub</span>
  <span class="admin-topbar-badge">Admin</span>
  <div class="admin-topbar-links">
    <a href="index.html" class="admin-topbar-link">Site</a>
    <a href="admin.html" class="admin-topbar-link">Main Admin</a>
    <a href="admin-vendors.html" class="admin-topbar-link">Vendors</a>
  </div>
</header>

<main class="admin-page">

  <!-- ── HERO ── -->
  <div class="admin-hero">
    <div>
      <p class="admin-hero-eyebrow">Admin Portal</p>
      <h1 class="admin-hero-title">Couples Admin</h1>
      <p class="admin-hero-sub">View, search, edit and manage couple accounts for Our Wedding Day Hub.</p>
    </div>
    <div id="authStatus" class="admin-status">Checking access…</div>
  </div>

  <!-- ── SEARCH ── -->
  <div class="admin-search-row">
    <input id="searchInput" class="admin-search-input" type="search" placeholder="Search by name, email, venue, date…">
    <button id="refreshBtn" class="btn btn-secondary btn-sm">↺ Refresh</button>
  </div>
  <p id="adminMessage" class="admin-msg"></p>

  <!-- ── COUPLES LIST ── -->
  <div id="couplesList" class="couples-list"></div>

</main>

<!-- ── ALL JS COMPLETELY UNCHANGED ── -->
<script type="module">
  import {
    auth, db, onAuthStateChanged,
    collection, getDocs, doc, updateDoc, deleteDoc, serverTimestamp
  } from "./firebase.js";

  const ADMIN_EMAIL = "stephanie@ourweddingdayhub.com";

  const couplesList  = document.getElementById("couplesList");
  const searchInput  = document.getElementById("searchInput");
  const refreshBtn   = document.getElementById("refreshBtn");
  const adminMessage = document.getElementById("adminMessage");
  const authStatus   = document.getElementById("authStatus");

  let couples = [];

  function setMessage(message) { adminMessage.textContent = message || ""; }

  function safe(value) { return value ?? ""; }

  function getDisplayName(user) {
    const partnerOne = user.partnerOneName || user.partner1Name || user.name || user.firstName || "";
    const partnerTwo = user.partnerTwoName || user.partner2Name || user.partnerName || "";
    if (partnerOne && partnerTwo) return `${partnerOne} & ${partnerTwo}`;
    return partnerOne || partnerTwo || user.email || "Unnamed couple";
  }

  function getSearchText(user) {
    return [getDisplayName(user), user.email, user.phone, user.weddingDate, user.venue, user.location, user.package, user.status, user.notes].filter(Boolean).join(" ").toLowerCase();
  }

  function esc(v) {
    return String(v ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function renderCouples() {
    const searchTerm = searchInput.value.trim().toLowerCase();
    const filtered = couples.filter(({ data }) => { if (!searchTerm) return true; return getSearchText(data).includes(searchTerm); });

    if (!filtered.length) {
      couplesList.innerHTML = '<div class="admin-empty">No couples found.</div>';
      return;
    }

    couplesList.innerHTML = "";
    filtered.forEach(({ id, data }) => {
      const displayName = getDisplayName(data);
      const statusVal = safe(data.status) || "couple";
      const isActive = ["active","planning","booked"].includes(statusVal);

      const card = document.createElement("div");
      card.className = "couple-card";
      card.dataset.id = id;

      card.innerHTML = `
        <div class="couple-card-header">
          <div class="couple-card-header-left">
            <div class="couple-card-icon">♡</div>
            <div>
              <p class="couple-card-name">${esc(displayName)}</p>
              <p class="couple-card-meta">${esc(data.email || "No email")}${data.weddingDate ? " · " + esc(data.weddingDate) : ""}</p>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span class="couple-status-pill ${isActive ? "active" : ""}">${esc(statusVal)}</span>
            <div class="couple-chevron">
              <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 5l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>
        <div class="couple-card-body">
          <div class="couple-form-grid">
            <div class="couple-form-field">
              <label>Partner one name</label>
              <input data-field="partnerOneName" value="${esc(safe(data.partnerOneName || data.partner1Name || data.name || data.firstName))}">
            </div>
            <div class="couple-form-field">
              <label>Partner two name</label>
              <input data-field="partnerTwoName" value="${esc(safe(data.partnerTwoName || data.partner2Name || data.partnerName))}">
            </div>
            <div class="couple-form-field">
              <label>Email</label>
              <input data-field="email" value="${esc(safe(data.email))}">
            </div>
            <div class="couple-form-field">
              <label>Phone</label>
              <input data-field="phone" value="${esc(safe(data.phone))}">
            </div>
            <div class="couple-form-field">
              <label>Wedding date</label>
              <input data-field="weddingDate" value="${esc(safe(data.weddingDate))}">
            </div>
            <div class="couple-form-field">
              <label>Venue</label>
              <input data-field="venue" value="${esc(safe(data.venue))}">
            </div>
            <div class="couple-form-field">
              <label>Location</label>
              <input data-field="location" value="${esc(safe(data.location))}">
            </div>
            <div class="couple-form-field">
              <label>Status</label>
              <select data-field="status">
                ${["couple","new","active","planning","booked","inactive"].map(s => `<option value="${s}" ${data.status === s ? "selected" : ""}>${s}</option>`).join("")}
              </select>
            </div>
            <div class="couple-form-field">
              <label>Package</label>
              <input data-field="package" value="${esc(safe(data.package))}">
            </div>
            <div class="couple-form-field">
              <label>Budget</label>
              <input data-field="budget" value="${esc(safe(data.budget))}">
            </div>
            <div class="couple-form-field full">
              <label>Notes</label>
              <textarea data-field="notes">${esc(safe(data.notes))}</textarea>
            </div>
          </div>
          <div class="couple-btn-row">
            <button class="btn btn-primary btn-sm save-btn" type="button">Save changes</button>
            <button class="btn btn-danger btn-sm delete-btn" type="button">Delete account</button>
          </div>
        </div>
      `;

      // Toggle open/close
      const header = card.querySelector(".couple-card-header");
      const body = card.querySelector(".couple-card-body");
      header.addEventListener("click", () => {
        header.classList.toggle("open");
        body.classList.toggle("open");
      });

      couplesList.appendChild(card);
    });
  }

  async function loadCouples() {
    setMessage("Loading…");
    try {
      const snapshot = await getDocs(collection(db, "users"));
      couples = snapshot.docs.map(d => ({ id: d.id, data: d.data() })).filter(({ data }) => {
        const role = (data.role || data.accountType || data.type || "").toLowerCase();
        return role === "couple" || role === "user" || !role;
      });
      couples.sort((a, b) => getDisplayName(a.data).localeCompare(getDisplayName(b.data)));
      renderCouples();
      setMessage(`${couples.length} couple account${couples.length === 1 ? "" : "s"} loaded.`);
    } catch (error) {
      console.error(error);
      setMessage("Could not load users. Check your Firebase rules.");
    }
  }

  async function saveCouple(card) {
    const id = card.dataset.id;
    const fields = card.querySelectorAll("[data-field]");
    const updates = {};
    fields.forEach(field => { updates[field.dataset.field] = field.value.trim(); });
    updates.role = "couple";
    updates.updatedAt = serverTimestamp();
    try {
      await updateDoc(doc(db, "users", id), updates);
      setMessage("Saved successfully ♡");
      await loadCouples();
    } catch (error) {
      console.error(error);
      setMessage("Could not save this couple. Check Firestore rules.");
    }
  }

  async function deleteCouple(card) {
    const id = card.dataset.id;
    const name = card.querySelector(".couple-card-name")?.textContent || "this couple";
    if (!confirm(`Delete ${name}? This only removes their Firestore record.`)) return;
    try {
      await deleteDoc(doc(db, "users", id));
      setMessage("Couple deleted from Firestore.");
      await loadCouples();
    } catch (error) {
      console.error(error);
      setMessage("Could not delete. Check Firestore rules.");
    }
  }

  couplesList.addEventListener("click", async (event) => {
    const card = event.target.closest(".couple-card[data-id]");
    if (!card) return;
    if (event.target.classList.contains("save-btn")) await saveCouple(card);
    if (event.target.classList.contains("delete-btn")) await deleteCouple(card);
  });

  searchInput.addEventListener("input", renderCouples);
  refreshBtn.addEventListener("click", loadCouples);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    if (user.email !== ADMIN_EMAIL) { alert("You do not have permission to view this page."); window.location.href = "index.html"; return; }
    authStatus.className = "admin-status ok";
    authStatus.textContent = `Admin: ${user.email}`;
    await loadCouples();
  });
</script>
</body>
</html>
