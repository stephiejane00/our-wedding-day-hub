<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Vendors - Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="images/header4.png" alt="Our Wedding Day Hub Header">
  </header>

  <main class="vendors-page">
    <section class="vendors-hero">
      <span class="auth-kicker">Find your dream team</span>
      <h1>Wedding Vendors</h1>
      <p>
        Browse beautiful wedding vendors across Australia and discover the people
        who can help bring your day to life.
      </p>
    </section>

    <section class="vendors-filters dashboard-card">
      <h2>Filter Vendors</h2>

      <div class="filter-grid">
        <div>
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="">All categories</option>
            <option value="photographer">Photographer</option>
            <option value="videographer">Videographer</option>
            <option value="content_creator">Content Creator</option>
            <option value="makeup_artist">Makeup Artist</option>
            <option value="hair_stylist">Hair Stylist</option>
            <option value="beauty_salon">Beauty Salon</option>
            <option value="spray_tan">Spray Tanning</option>
            <option value="skin_aesthetics">Skin & Aesthetics</option>
            <option value="singer">Singer</option>
            <option value="band">Band</option>
            <option value="dj">DJ</option>
            <option value="acoustic">Acoustic Musician</option>
            <option value="violinist">Violinist</option>
            <option value="saxophonist">Saxophonist</option>
            <option value="harpist">Harpist</option>
            <option value="mc">MC</option>
            <option value="florist">Florist</option>
            <option value="stylist">Wedding Stylist</option>
            <option value="event_designer">Event Designer</option>
            <option value="balloon">Balloon Stylist</option>
            <option value="backdrops">Backdrops & Arches</option>
            <option value="caterer">Caterer</option>
            <option value="cake">Wedding Cake Designer</option>
            <option value="dessert">Dessert Bar</option>
            <option value="bar">Mobile Bar</option>
            <option value="coffee">Coffee Cart</option>
            <option value="food_truck">Food Truck</option>
            <option value="venue">Wedding Venue</option>
            <option value="ceremony_venue">Ceremony Venue</option>
            <option value="reception_venue">Reception Venue</option>
            <option value="elopement">Elopement Location</option>
            <option value="outdoor">Outdoor Venue</option>
            <option value="invitations">Invitations</option>
            <option value="stationery">Wedding Stationery</option>
            <option value="signage">Signage</option>
            <option value="calligraphy">Calligraphy</option>
            <option value="bridal">Bridal Boutique</option>
            <option value="bridesmaid">Bridesmaid Dresses</option>
            <option value="formal">Formal Wear</option>
            <option value="suits">Suit Hire</option>
            <option value="designer">Custom Designer</option>
            <option value="rings">Wedding Rings</option>
            <option value="engagement">Engagement Rings</option>
            <option value="custom_jewellery">Custom Jewellery</option>
            <option value="cars">Wedding Cars</option>
            <option value="luxury_cars">Luxury Cars</option>
            <option value="vintage_cars">Vintage Cars</option>
            <option value="limo">Limousine</option>
            <option value="bus">Guest Transport</option>
            <option value="live_painter">Live Wedding Painter</option>
            <option value="photo_booth">Photo Booth</option>
            <option value="audio_guestbook">Audio Guestbook</option>
            <option value="wedding_content_creator">Wedding Content Creator</option>
            <option value="planner">Wedding Planner</option>
            <option value="coordinator">Wedding Coordinator</option>
            <option value="on_day_coordinator">On-the-day Coordinator</option>
            <option value="honeymoon">Honeymoon Planner</option>
            <option value="pet_attendant">Pet Attendant</option>
            <option value="child_minder">Child Minder / Wedding Nanny</option>
            <option value="furniture">Furniture Hire</option>
            <option value="decor">Decor Hire</option>
            <option value="tableware">Tableware Hire</option>
            <option value="lighting">Lighting Hire</option>
            <option value="marquee">Marquee Hire</option>
            <option value="favours">Wedding Favours</option>
            <option value="gifts">Personalised Gifts</option>
            <option value="hampers">Hampers</option>
          </select>
        </div>

        <div>
          <label for="stateFilter">State</label>
          <select id="stateFilter">
            <option value="">All states</option>
            <option value="Queensland">Queensland</option>
            <option value="New South Wales">New South Wales</option>
            <option value="Victoria">Victoria</option>
            <option value="South Australia">South Australia</option>
            <option value="Western Australia">Western Australia</option>
            <option value="Tasmania">Tasmania</option>
            <option value="Australian Capital Territory">Australian Capital Territory</option>
            <option value="Northern Territory">Northern Territory</option>
          </select>
        </div>

        <div>
          <label for="searchFilter">Search</label>
          <input type="text" id="searchFilter" placeholder="Business name, bio, location...">
        </div>
      </div>
    </section>

    <section>
      <div id="vendorsGrid" class="vendors-grid"></div>
      <p id="emptyMessage" class="empty-message" style="display:none;">
        No vendors match your filters just yet.
      </p>
    </section>
  </main>

  <script type="module">
    import {
      db,
      collection,
      getDocs
    } from './firebase.js';

    const vendorsGrid = document.getElementById('vendorsGrid');
    const emptyMessage = document.getElementById('emptyMessage');
    const categoryFilter = document.getElementById('categoryFilter');
    const stateFilter = document.getElementById('stateFilter');
    const searchFilter = document.getElementById('searchFilter');

    let allVendors = [];

    function prettifyCategory(category) {
      return category
        .replaceAll('_', ' ')
        .replace(/\b\w/g, letter => letter.toUpperCase());
    }

    function createVendorCard(vendor) {
      const card = document.createElement('article');
      card.className = 'vendor-card-public';

      const categories = Array.isArray(vendor.categories) ? vendor.categories : [];
      const states = Array.isArray(vendor.states) ? vendor.states : [];
      const regions = Array.isArray(vendor.regions) ? vendor.regions : [];

      const shortBio = vendor.bio
        ? vendor.bio.length > 180
          ? vendor.bio.slice(0, 180) + '...'
          : vendor.bio
        : 'This vendor has not added their bio yet.';

      card.innerHTML = `
        <div class="vendor-card-public-inner">
          <div class="vendor-card-top">
            <h3>${vendor.businessName || 'Vendor'}</h3>
            <p class="vendor-card-location">
              ${regions.slice(0, 2).join(', ') || states.slice(0, 2).join(', ') || 'Australia'}
            </p>
          </div>

          <p class="vendor-card-bio">${shortBio}</p>

          <div class="vendor-card-tags">
            ${categories.slice(0, 4).map(category => `
              <span class="vendor-tag">${prettifyCategory(category)}</span>
            `).join('')}
          </div>

          <div class="vendor-card-links">
            <a class="pretty-button small-button" href="vendor-profile.html?id=${vendor.uid}">
              View Profile
            </a>
          </div>
        </div>
      `;

      return card;
    }

    function renderVendors(vendors) {
      vendorsGrid.innerHTML = '';

      if (vendors.length === 0) {
        emptyMessage.style.display = 'block';
        return;
      }

      emptyMessage.style.display = 'none';

      vendors.forEach(vendor => {
        vendorsGrid.appendChild(createVendorCard(vendor));
      });
    }

    function applyFilters() {
      const categoryValue = categoryFilter.value;
      const stateValue = stateFilter.value;
      const searchValue = searchFilter.value.trim().toLowerCase();

      const filtered = allVendors.filter(vendor => {
        const categories = Array.isArray(vendor.categories) ? vendor.categories : [];
        const states = Array.isArray(vendor.states) ? vendor.states : [];
        const regions = Array.isArray(vendor.regions) ? vendor.regions : [];

        const matchesCategory = !categoryValue || categories.includes(categoryValue);
        const matchesState = !stateValue || states.includes(stateValue);

        const searchableText = [
          vendor.businessName || '',
          vendor.bio || '',
          vendor.email || '',
          states.join(' '),
          regions.join(' '),
          categories.join(' ')
        ].join(' ').toLowerCase();

        const matchesSearch = !searchValue || searchableText.includes(searchValue);

        return matchesCategory && matchesState && matchesSearch;
      });

      renderVendors(filtered);
    }

    async function loadVendors() {
      vendorsGrid.innerHTML = '<p class="empty-message">Loading vendors...</p>';

      try {
        const snapshot = await getDocs(collection(db, 'vendors'));

        allVendors = snapshot.docs
          .map(doc => doc.data())
          .filter(vendor => vendor.published === true && vendor.profileVisible === true)
          .sort((a, b) => (a.businessName || '').localeCompare(b.businessName || ''));

        renderVendors(allVendors);
      } catch (error) {
        console.error(error);
        vendorsGrid.innerHTML = '<p class="empty-message">Sorry, there was a problem loading vendors.</p>';
      }
    }

    categoryFilter.addEventListener('change', applyFilters);
    stateFilter.addEventListener('change', applyFilters);
    searchFilter.addEventListener('input', applyFilters);

    loadVendors();
  </script>
  <footer class="site-footer">
  <p>© 2026 Our Wedding Day Hub</p>
  <p>ABN 76 688 637 041 • Australia</p>
</footer>
</body>
</html>
