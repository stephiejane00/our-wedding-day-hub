<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="hero hero-flex">

  <!-- LEFT: LOGO -->
  <div class="header-left">
    <img src="images/header3.png" alt="Our Wedding Day Hub" class="logo">
  </div>

  <!-- RIGHT: CONTENT -->
  <div class="header-right">

    <p class="tagline">Discover trusted wedding vendors in your location</p>

    <!-- SEARCH -->
    <div class="search">
      <input type="text" id="search" placeholder="Search vendors..." onkeyup="searchVendors()">
    </div>

    <!-- CATEGORY BUTTONS -->
    <div class="category-buttons">
      <button onclick="filterVendors('all')">All Vendors</button>
      <button onclick="filterVendors('flowers')">Florists</button>
      <button onclick="filterVendors('cakes')">Cakes</button>
      <button onclick="filterVendors('photography')">Photography</button>
      <button onclick="filterVendors('beauty')">Hair & Beauty</button>
    </div>

  </div>

</header>

<!-- VENDORS GRID -->
<section class="vendors" id="vendors-container">
  <!-- Vendors load from vendors.json -->
</section>

<!-- JOIN SECTION -->
<section class="join">
  <h2>Join Our Wedding Day Hub</h2>
  <p>Showcase your business to couples actively planning their wedding.</p>
  <button onclick="window.location.href='apply.html'">Apply To Join</button>
</section>

<!-- FOOTER -->
<footer>
  <p>
    <a href="about.html" class="footer-link">About Us</a> | 
    <a href="contact.html" class="footer-link">Contact Us</a>
  </p>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script src="script.js"></script>

</body>
</html>
