<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">
  <img src="images/header4.png" alt="Our Wedding Day Hub" class="header-image">
</header>

<!-- SEARCH -->
<div class="search">
  <input type="text" id="search" placeholder="Search by vendor, location, category..." onkeyup="searchVendors()">
</div>

<!-- FEATURED SLIDER -->
<section class="featured-section">
  <h2>Featured Vendors</h2>

  <div class="slider">
    <button class="slider-btn prev" onclick="prevSlide()">❮</button>

    <div class="slider-track" id="slider-track">
      <!-- JS will inject featured vendors here -->
    </div>

    <button class="slider-btn next" onclick="nextSlide()">❯</button>
  </div>
</section>

<!-- SEARCH RESULTS -->
<section class="vendors" id="vendors-container">
</section>

<!-- JOIN SECTION -->
<section class="join">
  <h2>Join Our Wedding Day Hub</h2>
  <p>Showcase your business to couples actively planning their wedding.</p>
  <button onclick="window.location.href='apply.html'">Apply To Join</button>
</section>

<footer>
  <p>
    <a href="about.html" class="footer-link">About Us</a> | 
    <a href="contact.html" class="footer-link">Contact Us</a>
  </p>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script src="vendors.json"></script>
<script src="script.js"></script>
</body>
</html>
