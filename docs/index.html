<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* KEEP ORIGINAL CLASSES (vendor) */
    .vendors-carousel-section {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding-bottom: 10px;
    }

    .vendors-carousel-shell {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 10px;
    }

    .vendors-arrow {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 999px;
      background: #ead8cb;
      color: #3d342f;
      font-size: 1.6rem;
      cursor: pointer;
    }

    .vendors-carousel-viewport {
      flex: 1;
      overflow: hidden;
    }

    .vendors-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .vendor-card {
      background: #fff;
      border-radius: 22px;
      padding: 18px;
      cursor: pointer;
    }

    .vendor-profile-btn {
      border-radius: 999px;
      background: #ead8cb;
      padding: 12px 20px;
      cursor: pointer;
    }

    .vendors-dots {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }
  </style>
</head>

<body>

<header class="hero">
  <img src="images/1.png" class="header-image">
  <!-- ✅ visible text changed -->
  <p>Connect with trusted wedding partners in your area, without the overwhelm.</p>
</header>

<main>

  <section class="search-wrap">
    <input id="searchInput" placeholder="Search by partner, location, category...">
    <button id="searchBtn">Search</button>
  </section>

  <!-- KEEP vendor structure -->
  <section class="vendors-carousel-section">

    <div class="vendors-carousel-shell">
      <button id="prevVendorsBtn" class="vendors-arrow">&#8249;</button>

      <div class="vendors-carousel-viewport">
        <section id="vendorsGrid" class="vendors-grid"></section>
      </div>

      <button id="nextVendorsBtn" class="vendors-arrow">&#8250;</button>
    </div>

    <div id="vendorsDots" class="vendors-dots"></div>

    <!-- ✅ visible text changed -->
    <p>We’re growing, and new partners are joining. Be one of the first to be seen.</p>
    <p id="emptyMessage" style="display:none;">No live partners found yet.</p>

  </section>

</main>

<script type="module">
import {
  db,
  collection,
  getDocs
} from "./firebase.js";

/* KEEP vendor variables */
const vendorsGrid = document.getElementById("vendorsGrid");
const prevVendorsBtn = document.getElementById("prevVendorsBtn");
const nextVendorsBtn = document.getElementById("nextVendorsBtn");

let allVendors = [];

/* KEEP vendor logic */
function goToVendor(vendor) {
  window.location.href = `vendor.html?id=${vendor.docId}`;
}

function renderVendors(vendors) {
  vendorsGrid.innerHTML = "";

  if (!vendors.length) {
    document.getElementById("emptyMessage").style.display = "block";
    return;
  }

  vendors.forEach((vendor) => {
    const card = document.createElement("div");
    card.className = "vendor-card";

    /* ✅ visible text only */
    const name = vendor.businessName || "Partner";

    card.innerHTML = `
      <h3>${name}</h3>
      <p>Beautiful partner profile coming soon.</p>
      <button class="vendor-profile-btn">View Profile</button>
    `;

    card.addEventListener("click", () => goToVendor(vendor));

    vendorsGrid.appendChild(card);
  });
}

async function loadVendors() {
  const snapshot = await getDocs(collection(db, "vendors"));

  const list = [];

  snapshot.forEach((doc) => {
    list.push({
      ...doc.data(),
      docId: doc.id
    });
  });

  allVendors = list;
  renderVendors(allVendors);
}

loadVendors();
</script>

</body>
</html>
