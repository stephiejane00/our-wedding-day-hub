<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">

  <img src="images/header.png" alt="Our Wedding Day Hub" class="header-image">

  <!-- TAGLINE -->
  <p class="tagline">Discover trusted wedding vendors across Australia</p>

  <!-- NAVIGATION LINKS -->
  <nav class="nav-links" style="margin-bottom:20px;">
    <a href="about.html" style="margin:0 15px; font-weight:bold; color:#2F4F2F; text-decoration:none;">About Us</a>
    <a href="contact.html" style="margin:0 15px; font-weight:bold; color:#2F4F2F; text-decoration:none;">Contact Us</a>
  </nav>

  <!-- SEARCH BAR -->
  <div class="search">
    <input type="text" id="search" placeholder="Search vendors..." onkeyup="searchVendors()">
  </div>

  <!-- CATEGORY BUTTONS -->
  <div class="category-buttons">
    <button onclick="filterVendors('all')">All Vendors</button>
    <button onclick="filterVendors('flowers')">Florists</button>
    <button onclick="filterVendors('cakes')">Cakes</button>
    <button onclick="filterVendors('photography')">Photography</button>
    <button onclick="filterVendors('beauty')">Hair & Beauty</button>
  </div>

</header>

<!-- VENDORS WILL LOAD FROM JSON -->
<section class="vendors" id="vendors-container">
  <!-- Dynamically filled by script.js -->
</section>

<section class="join">
  <h2>Join Our Wedding Day Hub</h2>
  <p>Showcase your business to couples actively planning their wedding.</p>
  <button onclick="window.location.href='apply.html'">Apply To Join</button>
</section>

<footer>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script src="script.js"></script>
</body>
</html>
