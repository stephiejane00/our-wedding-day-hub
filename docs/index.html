<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="hero">
  <img src="images/header4.png" alt="Our Wedding Day Hub" class="header-image">

  <!-- SEARCH BAR -->
  <div class="search">
    <input type="text" id="search" placeholder="Search by vendor, location, category..." onkeyup="searchVendors()">
  </div>
</header>

<!-- FEATURED VENDORS -->
<section class="vendors" id="vendors-container">
  <!-- Only featured vendors (3) will show on the front page -->
  <!-- Vendors will load automatically from vendors.json -->
</section>

<!-- JOIN SECTION -->
<section class="join">
  <h2>Join Our Wedding Day Hub</h2>
  <p>Showcase your business to couples actively planning their wedding.</p>
  <button onclick="window.location.href='apply.html'">Apply To Join</button>
</section>

<!-- FOOTER -->
<footer>
  <p>
    <a href="about.html" class="footer-link">About Us</a> | 
    <a href="contact.html" class="footer-link">Contact Us</a>
  </p>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script src="script.js"></script>
</body>
</html>
