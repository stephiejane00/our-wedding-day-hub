<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
<style>
/* VENDOR CARDS */
.vendor-card {
  border-radius: 0; /* straight corners */
  box-shadow: 0 6px 20px rgba(212,175,55,0.3); /* gold glow */
  padding: 15px;
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
}

.vendor-card img {
  width: 100%;
  display: block;
  margin-bottom: 10px;
}

.vendor-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 25px rgba(212,175,55,0.5);
}

/* FEATURED SLIDER */
.featured-slider-wrapper {
  position: relative;
  max-width: 1200px;
  margin: 40px auto;
  overflow: hidden;
}

.featured-slider {
  display: flex;
  gap: 30px;
  overflow-x: auto;
  scroll-behavior: smooth;
  padding-bottom: 10px;
}

.slider-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 2rem;
  font-weight: bold;
  cursor: pointer;
  z-index: 10;
  color: #2F4F2F;
  user-select: none;
}

.slider-arrow.left { left: 0; }
.slider-arrow.right { right: 0; }

/* SEARCH BAR */
.search input {
  width: 90%;
  max-width: 600px;
  padding: 12px 15px;
  font-size: 1rem;
  margin: 20px auto;
  display: block;
  border: 1px solid #ccc;
  border-radius: 5px;
}

/* APPLY BUTTON */
.apply-button {
  display: inline-block;
  background: #000;
  color: #fff;
  padding: 18px 36px;
  font-size: 1.3rem;
  text-decoration: none;
  margin: 20px auto 50px auto;
  transition: 0.3s;
}

.apply-button:hover {
  transform: scale(1.05);
}

/* SHOWCASE YOUR BUSINESS SECTION */
.join {
  text-align: center;
  max-width: 800px;
  margin: 0 auto 60px auto;
}
</style>
</head>
<body>

<header class="hero">
  <img src="images/header4.png" alt="Our Wedding Day Hub" class="header-image">
</header>

<!-- TOP NAV -->
<nav class="top-nav">
  <a href="about.html">About Us</a> | 
  <a href="contact.html">Contact Us</a>
</nav>

<!-- SEARCH BAR -->
<div class="search">
  <input type="text" id="search" placeholder="Search by vendor, location, category..." onkeyup="searchVendors()">
</div>

<!-- FEATURED VENDOR SLIDER -->
<div class="featured-slider-wrapper">
  <div class="slider-arrow left" onclick="prevSlide()">&#10094;</div>
  <div class="featured-slider" id="sliderTrack">
    <!-- Vendor cards injected via script -->
  </div>
  <div class="slider-arrow right" onclick="nextSlide()">&#10095;</div>
</div>

<!-- SHOWCASE YOUR BUSINESS -->
<section class="join">
  <h2>Showcase Your Business to Engaged Couples</h2>
  <p>Connect with couples actively planning their wedding and elevate your online presence within a curated directory of trusted suppliers.</p>
  <a href="apply.html" class="apply-button">Start Showcasing Your Business</a>
</section>

<footer>
  <a href="terms.html">Terms</a> |
<a href="privacy.html">Privacy</a> |
<a href="refund.html">Refunds</a>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script>
// Featured vendors with correct file paths
const sliderTrack = document.getElementById("sliderTrack");
let currentSlide = 0;

const featuredVendors = [
  { name: "Kaity Kissed Nails & Design", img: "images/nails1.jpg", desc: "Luxury nails and beauty services.", page: "vendors/kaity-kissed-nails-and-designs.html" },
  { name: "Moments with Koarlie Studios", img: "images/koarlie1.png", desc: "Capturing your wedding memories beautifully.", page: "vendors/moments-with-koarlie-studios.html" },
  { name: "The Roamed Collective", img: "images/trc1.jpg", desc: "Creative photography & videography.", page: "vendors/the-roamed-collective.html" },
  { name: "Rosita Flowers", img: "images/rosita2.jpg", desc: "Beautiful floral arrangements.", page: "vendors/rosita-flowers.html" },
  { name: "Passion For Cakes", img: "images/cake2.jpg", desc: "Delicious wedding cakes.", page: "vendors/passion-for-cakes.html" },
  { name: "Brazilian Beauty", img: "images/beauty2.jpg", desc: "Bridal hair & makeup services.", page: "vendors/brazilian-beauty.html" }
];

// Clear slider
sliderTrack.innerHTML = "";

// Add vendor cards
featuredVendors.forEach(vendor => {
  const card = document.createElement("div");
  card.classList.add("vendor-card");

  card.innerHTML = `
    <img src="${vendor.img}" alt="${vendor.name}">
    <h3>${vendor.name}</h3>
    <p>${vendor.desc}</p>
  `;

  // Make the card clickable
  card.addEventListener("click", () => {
    window.location.href = vendor.page;
  });

  sliderTrack.appendChild(card);
});

// Slider controls
const slideWidth = 320 + 30; // card width + gap

function nextSlide() {
  if (currentSlide < featuredVendors.length - 3) {
    currentSlide++;
    sliderTrack.scrollBy({ left: slideWidth, behavior: 'smooth' });
  }
}

function prevSlide() {
  if (currentSlide > 0) {
    currentSlide--;
    sliderTrack.scrollBy({ left: -slideWidth, behavior: 'smooth' });
  }
}
</script>

<script src="script.js"></script>
</body>
</html>
