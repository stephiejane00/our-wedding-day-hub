<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="hero">

<img src="images/header.png" alt="Our Wedding Day Hub" class="header-image">

<h1>Our Wedding Day Hub</h1>
<p class="tagline">Discover trusted wedding vendors across Australia</p>

<div class="search">
<input type="text" id="search" placeholder="Search vendors..." onkeyup="searchVendors()">
</div>

<div class="category-buttons">
<button onclick="filterVendors('all')">All Vendors</button>
<button onclick="filterVendors('flowers')">Florists</button>
<button onclick="filterVendors('cakes')">Cakes</button>
<button onclick="filterVendors('photography')">Photography</button>
<button onclick="filterVendors('beauty')">Hair & Beauty</button>
</div>

</header>

<!-- VENDORS LOAD HERE FROM vendors.json -->
<section class="vendors" id="vendors-container">
</section>

<section class="join">

<h2>Join Our Wedding Day Hub</h2>

<p>
Showcase your business to couples actively planning their wedding.
</p>

<button onclick="window.location.href='apply.html'">
Apply To Join
</button>

</section>

<footer>
<p>© 2026 Our Wedding Day Hub</p>
</footer>

<script src="script.js"></script>

</body>
</html>
