<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Our Wedding Day Hub</title>
</head>
<body>
  <h1>Sign Up</h1>

  <form id="signupForm">
    <label for="type">I am a:</label>
    <select id="type" required>
      <option value="">Select</option>
      <option value="vendor">Vendor</option>
      <option value="couple">Couple</option>
    </select>
    <br><br>

    <label for="name">Name / Business Name:</label>
    <input type="text" id="name" required>
    <br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" required>
    <br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" required>
    <br><br>

    <button type="submit">Sign Up</button>
  </form>

  <p id="message"></p>

  <script type="module">
    import { auth, db, createUserWithEmailAndPassword, doc, setDoc } from './firebase.js';

    const signupForm = document.getElementById('signupForm');
    const message = document.getElementById('message');

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const type = document.getElementById('type').value;
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!type) return alert("Please select Vendor or Couple.");

      try {
        // Create account in Firebase Authentication
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Save info to Firestore
        await setDoc(doc(db, type + "s", user.uid), {
          name: name,
          email: email,
          createdAt: new Date()
        });

        message.textContent = "Account created successfully!";
        signupForm.reset();
      } catch (error) {
        console.error(error);
        message.textContent = "Error: " + error.message;
      }
    });
  </script>
</body>
</html>
