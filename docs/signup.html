<script type="module">
import {
  auth,
  db,
  createUserWithEmailAndPassword,
  sendEmailVerification,
  doc,
  setDoc,
  serverTimestamp
} from './firebase.js';

const signupForm = document.getElementById('signupForm');
const message = document.getElementById('message');
const typeSelect = document.getElementById('type');
const vendorFields = document.getElementById('vendorFields');

const urlParams = new URLSearchParams(window.location.search);
const isPaid = urlParams.get('paid');

signupForm.addEventListener('submit', async (e) => {
  e.preventDefault();

  const type = typeSelect.value;
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;

  if (!type) {
    message.textContent = 'Please select Vendor or Couple.';
    return;
  }

  if (type === 'vendor' && isPaid !== 'true') {
    message.textContent = 'Vendors must complete payment first.';
    setTimeout(() => {
      window.location.href = 'vendor-payment.html';
    }, 1200);
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // 💌 send verification email
    await sendEmailVerification(user);

    // 👤 USERS COLLECTION
    await setDoc(doc(db, 'users', user.uid), {
      uid: user.uid,
      email,
      name,
      role: type,
      emailVerified: false,
      createdAt: serverTimestamp()
    });

    // 💼 VENDOR ACCOUNT
    if (type === 'vendor') {
      const selectedCategories = Array.from(
        document.querySelectorAll('#categoryOptions input:checked')
      ).map(input => input.value);

      const selectedStates = Array.from(
        document.querySelectorAll('#stateOptions input:checked')
      ).map(input => input.value);

      const selectedRegions = Array.from(
        document.querySelectorAll('input[name="regions"]:checked')
      ).map(input => input.value);

      await setDoc(doc(db, 'vendors', user.uid), {
        uid: user.uid,
        businessName: name,
        email,
        categories: selectedCategories,
        states: selectedStates,
        regions: selectedRegions,

        // ✨ NEW IMPORTANT FIELDS
        bio: '',
        phone: '',
        website: '',
        instagram: '',

        paidSetupFee: true,
        subscriptionActive: true,
        profileVisible: false,
        accountStatus: 'active',

        published: false,
        createdAt: serverTimestamp()
      });
    }

    // 💍 COUPLE ACCOUNT
    if (type === 'couple') {
      await setDoc(doc(db, 'couples', user.uid), {
        uid: user.uid,
        name,
        email,
        favouriteVendorIds: [],
        visionBoard: [],
        createdAt: serverTimestamp()
      });
    }

    message.textContent = 'Account created! Please verify your email 💌';

    setTimeout(() => {
      window.location.href = 'login.html';
    }, 2000);

  } catch (error) {
    console.error(error);
    message.textContent = 'Error: ' + error.message;
  }
});
</script>
