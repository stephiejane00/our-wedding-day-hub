<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="images/header4.png" alt="Our Wedding Day Hub Header">
  </header>

  <main class="page-shell">
    <h1 class="page-title">Create Your Account</h1>
    <p class="page-subtitle">
      Join Our Wedding Day Hub as a vendor or a couple and start creating your perfect experience.
    </p>

    <section class="auth-card">
      <form id="signupForm" class="pretty-form">
        <label for="type">I am a:</label>
        <select id="type" required>
          <option value="">Select</option>
          <option value="vendor">Vendor</option>
          <option value="couple">Couple</option>
        </select>

        <label for="name">Name / Business Name:</label>
        <input type="text" id="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" required>

        <div id="vendorFields" style="display:none;">
          <label for="category">Category:</label>
          <select id="category">
            <option value="">Select category</option>
            <option value="photographer">Photographer</option>
            <option value="videographer">Videographer</option>
            <option value="makeup">Makeup Artist</option>
            <option value="hair">Hair Stylist</option>
            <option value="celebrant">Celebrant</option>
            <option value="music">Music / Band</option>
          </select>

          <label for="suburbs">Suburbs you service:</label>
          <input type="text" id="suburbs" placeholder="e.g. Brisbane, Gold Coast">

          <label for="postcodes">Postcodes you service:</label>
          <input type="text" id="postcodes" placeholder="e.g. 4000, 4217">
        </div>

        <button type="submit" class="pretty-button">Sign Up</button>
      </form>

      <p id="message" class="form-message"></p>

      <p class="auth-footer-text">
        Already have an account? <a href="login.html">Log in here</a>
      </p>
    </section>
  </main>

  <script type="module">
    import {
      auth,
      db,
      createUserWithEmailAndPassword,
      doc,
      setDoc
    } from './firebase.js';

    const signupForm = document.getElementById('signupForm');
    const message = document.getElementById('message');
    const typeSelect = document.getElementById('type');
    const vendorFields = document.getElementById('vendorFields');

    typeSelect.addEventListener('change', () => {
      vendorFields.style.display = typeSelect.value === 'vendor' ? 'block' : 'none';
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const type = document.getElementById('type').value;
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!type) {
        alert('Please select Vendor or Couple.');
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        let userData = {
          name,
          email,
          createdAt: new Date()
        };

        if (type === 'vendor') {
          const category = document.getElementById('category').value;
          const suburbs = document.getElementById('suburbs').value.trim();
          const postcodes = document.getElementById('postcodes').value.trim();

          userData = {
            ...userData,
            category,
            suburbs,
            postcodes
          };
        }

        await setDoc(doc(db, type + 's', user.uid), userData);

        message.textContent = 'Account created! Redirecting...';

        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1000);
      } catch (error) {
        console.error(error);
        message.textContent = 'Error: ' + error.message;
      }
    });
  </script>
</body>
</html>
