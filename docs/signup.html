<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <img src="images/header4.png" alt="Our Wedding Day Hub Header">
  </header>

  <h1>Sign Up</h1>

  <form id="signupForm">

    <label for="type">I am a:</label>
    <select id="type" required>
      <option value="">Select</option>
      <option value="vendor">Vendor</option>
      <option value="couple">Couple</option>
    </select>

    <label>Name / Business Name:</label>
    <input type="text" id="name" required>

    <label>Email:</label>
    <input type="email" id="email" required>

    <label>Password:</label>
    <input type="password" id="password" required>

    <!-- 👇 VENDOR ONLY FIELDS -->
    <div id="vendorFields" style="display:none;">

      <label>Category:</label>
      <select id="category">
        <option value="">Select category</option>
        <option value="photographer">Photographer</option>
        <option value="videographer">Videographer</option>
        <option value="makeup">Makeup Artist</option>
        <option value="hair">Hair Stylist</option>
        <option value="celebrant">Celebrant</option>
        <option value="music">Music / Band</option>
      </select>

      <label>Suburbs you service (comma separated):</label>
      <input type="text" id="suburbs" placeholder="e.g. Brisbane, Gold Coast">

      <label>Postcodes you service (comma separated):</label>
      <input type="text" id="postcodes" placeholder="e.g. 4000, 4217">

    </div>

    <button type="submit">Sign Up</button>
  </form>

  <p id="message"></p>

  <script type="module">
    import {
      auth,
      db,
      createUserWithEmailAndPassword,
      doc,
      setDoc
    } from './firebase.js';

    const signupForm = document.getElementById('signupForm');
    const message = document.getElementById('message');
    const typeSelect = document.getElementById('type');
    const vendorFields = document.getElementById('vendorFields');

    // Show/hide vendor fields
    typeSelect.addEventListener('change', () => {
      if (typeSelect.value === "vendor") {
        vendorFields.style.display = "block";
      } else {
        vendorFields.style.display = "none";
      }
    });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const type = document.getElementById('type').value;
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!type) {
        alert("Please select Vendor or Couple.");
        return;
      }

      try {
        // Create account
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        let userData = {
          name,
          email,
          createdAt: new Date()
        };

        // If vendor, add extra fields
        if (type === "vendor") {
          const category = document.getElementById('category').value;
          const suburbs = document.getElementById('suburbs').value;
          const postcodes = document.getElementById('postcodes').value;

          userData = {
            ...userData,
            category,
            suburbs,
            postcodes
          };
        }

        // Save to Firestore
        await setDoc(doc(db, type + "s", user.uid), userData);

        message.textContent = "Account created! Redirecting...";

        // Redirect to dashboard
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1000);

      } catch (error) {
        console.error(error);
        message.textContent = "Error: " + error.message;
      }
    });
  </script>

</body>
</html>
