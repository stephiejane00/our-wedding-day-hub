<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .top-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      padding: 18px 20px;
      background: #fffaf6;
      border-bottom: 1px solid #e8ddd2;
      flex-wrap: wrap;
    }

    .top-nav a {
      text-decoration: none;
      color: #111;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      transition: 0.25s;
      position: relative;
    }

    .top-nav a::after {
      content: "";
      position: absolute;
      width: 0;
      height: 1px;
      bottom: -4px;
      left: 0;
      background: #000;
      transition: width 0.25s ease;
    }

    .top-nav a:hover::after {
      width: 100%;
    }

    .nav-cta {
      background: #000;
      color: #fff !important;
      padding: 8px 16px;
      border-radius: 3px;
    }

    .nav-cta:hover {
      background: #333;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 28px;
      left: 0;
      background: #fffaf6;
      min-width: 220px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      padding: 10px 0;
      z-index: 100;
      border: 1px solid #e8ddd2;
    }

    .dropdown-content a {
      display: block;
      padding: 10px 16px;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .dropdown-content a:hover {
      background: #f4eee8;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    header img {
      width: 100%;
      display: block;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
    }

    @media (max-width: 768px) {
      .top-nav {
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="images/header4.png" alt="Our Wedding Day Hub Header">
  </header>

  <nav class="top-nav">
    <a href="index.html">Home</a>
    <a href="about.html">Our Story</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Enquiries</a>

    <div class="dropdown">
      <a href="#">Legal ▾</a>
      <div class="dropdown-content">
        <a href="terms.html">Terms &amp; Conditions</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="refund-policy.html">Refund Policy</a>
      </div>
    </div>

    <a href="signup.html" class="nav-cta">Join</a>
    <a href="login.html">Log In</a>
  </nav>

  <main class="auth-layout single-card">
    <section class="auth-card spiced">
      <span class="auth-kicker">Welcome back</span>
      <h1>Log In</h1>
      <p class="auth-mini-text">
        Sign in to manage your wedding hub account.
      </p>

      <form id="loginForm" class="pretty-form">
        <label for="email">Email:</label>
        <input type="email" id="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" required>

        <button type="submit" class="pretty-button wide-glow">Log In</button>
      </form>

      <p id="message" class="form-message"></p>

      <p class="auth-footer-text">
        Don’t have an account yet? <a href="signup.html">Create one here</a>
      </p>
    </section>
  </main>

  <footer>
    <p>© 2026 Our Wedding Day Hub</p>
  </footer>

  <script type="module">
    import {
      auth,
      db,
      signInWithEmailAndPassword,
      signOut,
      doc,
      getDoc
    } from './firebase.js';

    const loginForm = document.getElementById('loginForm');
    const message = document.getElementById('message');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.textContent = '';

      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await user.reload();

        if (!user.emailVerified) {
          await signOut(auth);
          message.textContent = 'Please verify your email before logging in.';
          return;
        }

        const userRef = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          await signOut(auth);
          message.textContent = 'We could not find your account details in the database.';
          return;
        }

        const userData = userSnap.data();

        message.textContent = 'Login successful! Redirecting...';

        setTimeout(() => {
          if (userData.role === 'vendor') {
            window.location.href = 'vendor-dashboard.html';
          } else if (userData.role === 'couple') {
            window.location.href = 'couple-dashboard.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        }, 1000);

      } catch (error) {
        console.error(error);
        message.textContent = 'Login failed: ' + error.message;
      }
    });
  </script>
</body>
</html>
