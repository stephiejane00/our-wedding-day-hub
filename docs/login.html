<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .top-nav {
      max-width: 1200px;
      margin: 22px auto 10px auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .top-nav-left,
    .top-nav-right {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .top-nav a {
      text-decoration: none;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .top-nav-left a {
      color: #000;
      padding: 4px 0;
      border: none;
      background: transparent;
      position: relative;
    }

    .top-nav-left a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 0;
      height: 1px;
      background: #000;
      transition: width 0.3s ease;
    }

    .top-nav-left a:hover::after {
      width: 100%;
    }

    .nav-button {
      display: inline-block;
      background: #000;
      color: #fff !important;
      padding: 10px 18px;
      text-decoration: none;
      font-size: 0.9rem;
      border: 1px solid #000;
      transition: all 0.3s ease;
    }

    .nav-button:hover {
      transform: translateY(-1px);
    }

    .nav-button.outline {
      background: #fff;
      color: #000 !important;
      border: 1px solid #000;
    }

    .nav-button.outline:hover {
      background: #000;
      color: #fff !important;
    }

    header img {
      width: 100%;
      display: block;
    }

    footer {
      text-align: center;
      padding: 30px 20px;
    }

    @media (max-width: 768px) {
      .top-nav {
        flex-direction: column;
        align-items: center;
      }

      .top-nav-left,
      .top-nav-right {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="images/header4.png" alt="Our Wedding Day Hub Header">
  </header>

  <nav class="top-nav">
    <div class="top-nav-left">
      <a href="index.html">Home</a>
      <a href="about.html">About Us</a>
      <a href="pricing.html">Pricing</a>
      <a href="contact.html">Contact Us</a>
      <a href="terms.html">Terms &amp; Conditions</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="refund-policy.html">Refund Policy</a>
    </div>

    <div class="top-nav-right">
      <a href="signup.html" class="nav-button">Sign Up</a>
      <a href="login.html" class="nav-button outline">Log In</a>
    </div>
  </nav>

  <main class="auth-layout single-card">
    <section class="auth-card spiced">
      <span class="auth-kicker">Welcome back</span>
      <h1>Log In</h1>
      <p class="auth-mini-text">
        Sign in to manage your wedding hub account.
      </p>

      <form id="loginForm" class="pretty-form">
        <label for="email">Email:</label>
        <input type="email" id="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" required>

        <button type="submit" class="pretty-button wide-glow">Log In</button>
      </form>

      <p id="message" class="form-message"></p>

      <p class="auth-footer-text">
        Don’t have an account yet? <a href="signup.html">Create one here</a>
      </p>
    </section>
  </main>

  <footer>
    <p>© 2026 Our Wedding Day Hub</p>
  </footer>

  <script type="module">
    import {
      auth,
      db,
      signInWithEmailAndPassword,
      signOut,
      doc,
      getDoc
    } from './firebase.js';

    const loginForm = document.getElementById('loginForm');
    const message = document.getElementById('message');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.textContent = '';

      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await user.reload();

        if (!user.emailVerified) {
          await signOut(auth);
          message.textContent = 'Please verify your email before logging in.';
          return;
        }

        const userRef = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          await signOut(auth);
          message.textContent = 'We could not find your account details in the database.';
          return;
        }

        const userData = userSnap.data();

        message.textContent = 'Login successful! Redirecting...';

        setTimeout(() => {
          if (userData.role === 'vendor') {
            window.location.href = 'vendor-dashboard.html';
          } else if (userData.role === 'couple') {
            window.location.href = 'couple-dashboard.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        }, 1000);

      } catch (error) {
        console.error(error);
        message.textContent = 'Login failed: ' + error.message;
      }
    });
  </script>
</body>
</html>
