<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="images/header4.png" alt="Our Wedding Day Hub Header">
  </header>

  <main class="auth-layout single-card">
    <section class="auth-card spiced">
      <span class="auth-kicker">Welcome back</span>
      <h1>Log In</h1>
      <p class="auth-mini-text">
        Sign in to manage your wedding hub account.
      </p>

      <form id="loginForm" class="pretty-form">
        <label for="email">Email:</label>
        <input type="email" id="email" required>

        <label for="password">Password:</label>
        <input type="password" id="password" required>

        <button type="submit" class="pretty-button wide-glow">Log In</button>
      </form>

      <p id="message" class="form-message"></p>

      <p class="auth-footer-text">
        Don’t have an account yet? <a href="signup.html">Create one here</a>
      </p>
    </section>
  </main>

  <script type="module">
    import {
      auth,
      db,
      signInWithEmailAndPassword,
      signOut,
      doc,
      getDoc
    } from './firebase.js';

    const loginForm = document.getElementById('loginForm');
    const message = document.getElementById('message');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.textContent = '';

      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await user.reload();

        if (!user.emailVerified) {
          await signOut(auth);
          message.textContent = 'Please verify your email before logging in.';
          return;
        }

        const userRef = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          await signOut(auth);
          message.textContent = 'We could not find your account details in the database.';
          return;
        }

        const userData = userSnap.data();

        message.textContent = 'Login successful! Redirecting...';

        setTimeout(() => {
          if (userData.role === 'vendor') {
            window.location.href = 'vendor-dashboard.html';
          } else if (userData.role === 'couple') {
            window.location.href = 'couple-dashboard.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        }, 1000);

      } catch (error) {
        console.error(error);
        message.textContent = 'Login failed: ' + error.message;
      }
    });
  </script>
</body>
</html>
