<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaity Kissed Nails & Designs | Our Wedding Day Hub</title>
<link rel="stylesheet" href="../style.css">
<style>
/* Gallery and Lightbox same as above */
.gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-top:20px; }
.gallery img{width:100%;border-radius:8px;border:2px solid #2F4F2F; cursor:pointer; transition:transform 0.3s;}
.gallery img:hover{transform:scale(1.05);}
.lightbox{display:none;position:fixed;z-index:1000;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;}
.lightbox-img{max-width:90%;max-height:90%;border-radius:10px;box-shadow:0 8px 25px rgba(0,0,0,0.5);}
#lightbox-close{position:absolute;top:20px;right:30px;color:white;font-size:2rem;font-weight:bold;cursor:pointer;}
#lightbox-prev,#lightbox-next{position:absolute;top:50%;color:white;font-size:2.5rem;font-weight:bold;cursor:pointer;user-select:none;transform:translateY(-50%);}
#lightbox-prev{left:30px;}#lightbox-next{right:30px;}
</style>
</head>
<body>

<header class="hero">
  <a href="../index.html" class="back-link" style="color:#2F4F2F;text-decoration:none;">← Back to Home</a>
  <h1 class="vendor-info">Kaity Kissed Nails & Designs</h1>
</header>

<main class="vendor-info">
  <p>Hi! I'm <strong>Kaity Anderson</strong> – creating elegant wedding nails with love and care. Perfect for brides, bridal parties, and special events.</p>
  <p><strong>Phone:</strong> 0432 129 525</p>
  <p><strong>Instagram:</strong> <a href="https://www.instagram.com/kaitykissed.nailsanddesigns" target="_blank">@kaitykissed.nailsanddesigns</a></p>

  <h2>Gallery</h2>
  <div class="gallery">
    <img src="../images/nails1.jpg" alt="Kaity Kissed Nails 1">
    <img src="../images/nails2.jpg" alt="Kaity Kissed Nails 2">
    <img src="../images/nails3.jpg" alt="Kaity Kissed Nails 3">
    <img src="../images/nails4.jpg" alt="Kaity Kissed Nails 4">
  </div>
</main>

<div id="lightbox" class="lightbox">
  <span id="lightbox-close">&times;</span>
  <span id="lightbox-prev">&#10094;</span>
  <img class="lightbox-img" src="" alt="Vendor Image">
  <span id="lightbox-next">&#10095;</span>
</div>

<footer>
<p>© 2026 Our Wedding Day Hub</p>
</footer>

<script>
const galleryImages=document.querySelectorAll('.gallery img');const lightbox=document.getElementById('lightbox');const lightboxImg=document.querySelector('.lightbox-img');const closeBtn=document.getElementById('lightbox-close');const prevBtn=document.getElementById('lightbox-prev');const nextBtn=document.getElementById('lightbox-next');let currentIndex=0;
function openLightbox(index){currentIndex=index;lightbox.style.display='flex';lightboxImg.src=galleryImages[currentIndex].src;lightboxImg.alt=galleryImages[currentIndex].alt;}
function showPrev(){currentIndex=(currentIndex-1+galleryImages.length)%galleryImages.length;lightboxImg.src=galleryImages[currentIndex].src;lightboxImg.alt=galleryImages[currentIndex].alt;}
function showNext(){currentIndex=(currentIndex+1)%galleryImages.length;lightboxImg.src=galleryImages[currentIndex].src;lightboxImg.alt=galleryImages[currentIndex].alt;}
galleryImages.forEach((img,index)=>{img.addEventListener('click',()=>openLightbox(index));});
closeBtn.addEventListener('click',()=>lightbox.style.display='none');prevBtn.addEventListener('click',showPrev);nextBtn.addEventListener('click',showNext);
lightbox.addEventListener('click',e=>{if(e.target===lightbox) lightbox.style.display='none';});
</script>

</body>
</html>
