    </div>

        ]

      {

        ]
      },
      {

        items: [

          ["bridesmaid", "Bridesmaid Dresses"],
          ["formal", "Formal Wear"],

    const allStates = [
      "Queensland",
      "New South Wales",
      "Victoria",
      "South Australia",
      "Western Australia",
      "Tasmania",
      "Australian Capital Territory",
      "Northern Territory"
    ];

    function formatCategory(value) {
      const map = {};
      categoryGroups.forEach(group => {
        group.items.forEach(([key, label]) => {
          map[key] = label;
        });
      });
      return map[value] || value;
    }

    function createCategoryOptionsHTML(selectedCategories = []) {
      return categoryGroups.map(group => `
        <strong>${group.title}</strong><br>
        ${group.items.map(([value, label]) => `
          <label style="display:block; margin-bottom:8px; font-weight:normal;">
            <input type="checkbox" value="${value}" ${selectedCategories.includes(value) ? 'checked' : ''} style="width:auto; margin-right:8px;">
            ${label}
          </label>
        `).join('')}
        <br>
      `).join('');
    }

    function createStateOptionsHTML(selectedStates = []) {
      return allStates.map(state => `
        <label style="display:block; margin-bottom:8px; font-weight:normal;">
          <input type="checkbox" value="${state}" ${selectedStates.includes(state) ? 'checked' : ''} style="width:auto; margin-right:8px;">
          ${state}
        </label>
      `).join('');
    }

    function renderRegionOptions(container, selectedStates = [], selectedRegions = []) {
      container.innerHTML = '';

      if (!selectedStates.length) {
        container.innerHTML = '<p class="small-text">Select states above first.</p>';
        return;
      }

      selectedStates.forEach(state => {
        const regions = regionsByState[state] || [];
        if (!regions.length) return;

        const heading = document.createElement('p');
        heading.style.fontWeight = 'bold';
        heading.style.margin = '12px 0 8px';
        heading.textContent = state;
        container.appendChild(heading);

        regions.forEach(region => {
          const label = document.createElement('label');
          label.style.display = 'block';
          label.style.marginBottom = '8px';
          label.style.fontWeight = 'normal';
          label.innerHTML = `
            <input type="checkbox" name="regions" value="${region}" ${selectedRegions.includes(region) ? 'checked' : ''} style="width:auto; margin-right:8px;">
            ${region}
          `;
          container.appendChild(label);
        });
      });
    }

    function getCheckedValues(containerSelector) {
      return Array.from(
        document.querySelectorAll(`${containerSelector} input:checked`)
      ).map(input => input.value);
    }

    async function loadCoupleVendorSearch() {
      const filterCard = document.createElement('section');
      filterCard.className = 'filter-card';
      dashboardContainer.appendChild(filterCard);

      const vendorsSnapshot = await getDocs(collection(db, 'vendors'));
      const vendors = vendorsSnapshot.docs.map(docItem => docItem.data());

      const categoryOptions = categoryGroups
        .flatMap(group => group.items)
        .map(([value, label]) => `<option value="${value}">${label}</option>`)
        .join('');

      const stateOptions = allStates
        .map(state => `<option value="${state}">${state}</option>`)
        .join('');

      filterCard.innerHTML = `
        <h2>Find Vendors</h2>

        <form class="pretty-form">
          <label for="filterCategory">Category:</label>
          <select id="filterCategory">
            <option value="">All categories</option>
            ${categoryOptions}
          </select>

          <label for="filterState">State:</label>
          <select id="filterState">
            <option value="">All states</option>
            ${stateOptions}
          </select>

          <label for="filterRegion">Region:</label>
          <select id="filterRegion">
            <option value="">All regions</option>
          </select>

          <button type="button" id="filterButton" class="pretty-button">Search Vendors</button>
        </form>

        <div id="vendorResults" class="vendor-results"></div>
      `;

      const filterState = filterCard.querySelector('#filterState');
      const filterRegion = filterCard.querySelector('#filterRegion');
      const filterButton = filterCard.querySelector('#filterButton');
      const vendorResults = filterCard.querySelector('#vendorResults');

      function updateRegionFilterOptions() {
        const selectedState = filterState.value;
        filterRegion.innerHTML = '<option value="">All regions</option>';

        if (!selectedState || !regionsByState[selectedState]) return;

        regionsByState[selectedState].forEach(region => {
          const option = document.createElement('option');
          option.value = region;
          option.textContent = region;
          filterRegion.appendChild(option);
        });
      }

      function renderVendors(filteredVendors) {
        if (filteredVendors.length === 0) {
          vendorResults.innerHTML = '<p>No vendors found matching your filters.</p>';
          return;
        }

        vendorResults.innerHTML = filteredVendors.map(vendor => `
          <div class="vendor-result-card">
            <h3>${vendor.name || 'Unnamed Vendor'}</h3>
            <p><strong>Categories:</strong> ${
              Array.isArray(vendor.categories) && vendor.categories.length
                ? vendor.categories.map(formatCategory).join(', ')
                : 'Not set'
            }</p>
            <p><strong>Email:</strong> ${vendor.email || 'Not provided'}</p>
            <p><strong>States:</strong> ${
              Array.isArray(vendor.states) && vendor.states.length
                ? vendor.states.join(', ')
                : 'Not set'
            }</p>
            <p><strong>Regions:</strong> ${
              Array.isArray(vendor.regions) && vendor.regions.length
                ? vendor.regions.join(', ')
                : 'Not set'
            }</p>
          </div>
        `).join('');
      }

      renderVendors(vendors);

      filterState.addEventListener('change', updateRegionFilterOptions);

      filterButton.addEventListener('click', () => {
        const category = filterCard.querySelector('#filterCategory').value;
        const state = filterState.value;
        const region = filterRegion.value;

        const filteredVendors = vendors.filter(vendor => {
          const categories = Array.isArray(vendor.categories) ? vendor.categories : [];
          const states = Array.isArray(vendor.states) ? vendor.states : [];
          const regions = Array.isArray(vendor.regions) ? vendor.regions : [];

          const categoryMatch = !category || categories.includes(category);
          const stateMatch = !state || states.includes(state);
          const regionMatch = !region || regions.includes(region);

          return categoryMatch && stateMatch && regionMatch;
        });

        renderVendors(filteredVendors);
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        welcomeMessage.textContent = 'You are not logged in. Redirecting...';
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
        return;
      }

      let userDoc = await getDoc(doc(db, 'vendors', user.uid));
      let type = 'Vendor';
      let collectionName = 'vendors';

      if (!userDoc.exists()) {
        userDoc = await getDoc(doc(db, 'couples', user.uid));
        type = 'Couple';
        collectionName = 'couples';
      }

      if (!userDoc.exists()) {
        welcomeMessage.textContent = 'User data not found.';
        return;
      }

      const data = userDoc.data();
      welcomeMessage.textContent = `Hello ${data.name || 'there'}! You are logged in as a ${type}.`;

      const infoCard = document.createElement('section');
      infoCard.className = 'dashboard-card';
      dashboardContainer.appendChild(infoCard);

      if (type === 'Vendor') {
        const selectedCategories = Array.isArray(data.categories) ? data.categories : [];
        const selectedStates = Array.isArray(data.states) ? data.states : [];
        const selectedRegions = Array.isArray(data.regions) ? data.regions : [];

        infoCard.innerHTML = `
          <h2>Vendor Profile</h2>

          <form class="pretty-form">
            <label for="name">Business Name:</label>
            <input type="text" id="name" value="${data.name || ''}">

            <label for="email">Email:</label>
            <input type="email" id="email" value="${data.email || ''}">

            <label>Categories:</label>
            <div id="categoryOptions" class="field-soft">
              ${createCategoryOptionsHTML(selectedCategories)}
            </div>

            <label>States you service:</label>
            <div id="stateOptions" class="field-soft">
              ${createStateOptionsHTML(selectedStates)}
            </div>

            <label>Regions you service:</label>
            <div id="regionOptions" class="field-soft"></div>

            <button type="button" id="saveButton" class="pretty-button">Save Changes</button>
            <p id="saveMessage" class="small-text"></p>
          </form>
        `;

        const regionOptions = infoCard.querySelector('#regionOptions');
        const stateInputs = infoCard.querySelectorAll('#stateOptions input');
        const saveButton = infoCard.querySelector('#saveButton');
        const saveMessage = infoCard.querySelector('#saveMessage');

        function getSelectedStatesFromCard() {
          return Array.from(
            infoCard.querySelectorAll('#stateOptions input:checked')
          ).map(input => input.value);
        }

        function getSelectedRegionsFromCard() {
          return Array.from(
            infoCard.querySelectorAll('#regionOptions input:checked')
          ).map(input => input.value);
        }

        function renderRegionsForVendorCard(keepSelections = true) {
          const currentStates = getSelectedStatesFromCard();
          const currentRegions = keepSelections ? getSelectedRegionsFromCard() : [];
          renderRegionOptions(regionOptions, currentStates, currentRegions.length ? currentRegions : selectedRegions);
        }

        renderRegionOptions(regionOptions, selectedStates, selectedRegions);

        stateInputs.forEach(input => {
          input.addEventListener('change', () => {
            const currentSelectedRegions = getSelectedRegionsFromCard();
            renderRegionOptions(regionOptions, getSelectedStatesFromCard(), currentSelectedRegions);
          });
        });

        saveButton.addEventListener('click', async () => {
          const name = infoCard.querySelector('#name').value.trim();
          const email = infoCard.querySelector('#email').value.trim();

          const categories = Array.from(
            infoCard.querySelectorAll('#categoryOptions input:checked')
          ).map(input => input.value);

          const states = getSelectedStatesFromCard();
          const regions = getSelectedRegionsFromCard();

          try {
            await setDoc(doc(db, collectionName, user.uid), {
              ...data,
              name,
              email,
              categories,
              states,
              regions
            });

            saveMessage.textContent = 'Info saved successfully!';
          } catch (err) {
            saveMessage.textContent = 'Error saving info: ' + err.message;
          }
        });
      }

      if (type === 'Couple') {
        infoCard.innerHTML = `
          <h2>Couple Profile</h2>

          <form class="pretty-form">
            <label for="name">Names:</label>
            <input type="text" id="name" value="${data.name || ''}">

            <label for="email">Email:</label>
            <input type="email" id="email" value="${data.email || ''}">

            <label for="weddingDate">Wedding Date:</label>
            <input type="date" id="weddingDate" value="${data.weddingDate || ''}">

            <label for="notes">Notes:</label>
            <textarea id="notes" rows="4">${data.notes || ''}</textarea>

            <button type="button" id="saveButton" class="pretty-button">Save Changes</button>
            <p id="saveMessage" class="small-text"></p>
          </form>
        `;

        const saveButton = infoCard.querySelector('#saveButton');
        const saveMessage = infoCard.querySelector('#saveMessage');

        saveButton.addEventListener('click', async () => {
          const name = infoCard.querySelector('#name').value.trim();
          const email = infoCard.querySelector('#email').value.trim();
          const weddingDate = infoCard.querySelector('#weddingDate').value;
          const notes = infoCard.querySelector('#notes').value.trim();

          try {
            await setDoc(doc(db, collectionName, user.uid), {
              ...data,
              name,
              email,
              weddingDate,
              notes
            });

            saveMessage.textContent = 'Info saved successfully!';
          } catch (err) {
            saveMessage.textContent = 'Error saving info: ' + err.message;
          }
        });

        await loadCoupleVendorSearch();
      }
    });

    logoutButton.addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'login.html';
    });
  </script>
