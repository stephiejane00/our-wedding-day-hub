<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background-color: #fffafc;
    color: #333;
    margin: 0;
  }

  /* Hero header */
  .hero {
    text-align: center;
    padding: 20px;
  }

  .hero img {
    width: 100%;
    height: auto;
    display: block;
    margin: 0 auto 20px auto;
  }

  .hero h1 {
    font-family: 'Georgia', serif;
    font-size: 2.8rem;
    margin: 10px 0 5px 0;
    color: #5c3d4a;
  }

  .hero p {
    font-style: italic;
    font-size: 1.2rem;
    color: #7a5a68;
    margin: 0 0 20px 0;
  }

  /* Contact form */
  .vendor-info {
    max-width: 600px;
    margin: 40px auto;
    padding: 0 20px;
    text-align: center;
  }

  form {
    display: flex;
    flex-direction: column;
  }

  label {
    margin-top: 15px;
    margin-bottom: 5px;
    font-weight: 500;
    text-align: left;
  }

  input, textarea {
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 1rem;
    width: 100%;
    box-sizing: border-box;
  }

  button.send-btn {
    margin-top: 20px;
    padding: 14px;
    background-color: #a6787f;
    color: #fff;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  button.send-btn:hover {
    background-color: #8b5c68;
  }

  .success-msg {
    display: none;
    margin-top: 20px;
    color: #5c3d4a;
    font-weight: 500;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 40px 20px;
    font-size: 0.9rem;
    color: #888;
  }
</style>
</head>
<body>

<header class="hero">
  <img src="images/header4.png" alt="Our Wedding Day Hub">
  <h1>Contact Us</h1>
  <p>Have questions or need help? We're here for you 🤍</p>
</header>

<section class="vendor-info">
<form id="contact-form">
  <label for="name">Your Name</label>
  <input type="text" id="name" placeholder="Enter your name" required>

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="Enter your email" required>

  <label for="message">Message</label>
  <textarea id="message" rows="6" placeholder="Write your message here" required></textarea>

  <button type="submit" class="send-btn">Send Message 🤍</button>
  <p class="success-msg">Message sent! Thank you 💌</p>
</form>
</section>

<footer>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script>
document.getElementById('contact-form').addEventListener('submit', function(e){
  e.preventDefault();
  this.reset();
  document.querySelector('.success-msg').style.display = 'block';
});
</script>

</body>
</html>
