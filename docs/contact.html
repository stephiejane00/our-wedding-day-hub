<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <a href="index.html" class="back-link">← Back to Home</a>
  <h1>Contact Us</h1>
</header>

<main class="vendor-info">
  <p>We’d love to hear from you! Whether you have a question, feedback, or want to become a vendor, fill out the form below and we’ll get back to you as soon as possible.</p>

  <!-- Formspree form -->
  <form action="https://formspree.io/f/xwvrrkwg" method="POST">
    <p>
      <label for="name">Your Name:</label><br>
      <input type="text" name="name" id="name" required>
    </p>
    <p>
      <label for="email">Your Email:</label><br>
      <input type="email" name="email" id="email" required>
    </p>
    <p>
      <label for="message">Your Message:</label><br>
      <textarea name="message" id="message" rows="6" required></textarea>
    </p>
    <p>
      <button type="submit">Send Message</button>
    </p>
  </form>
</main>

<footer>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

</body>
</html>
