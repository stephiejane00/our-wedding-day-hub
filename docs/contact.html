<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiries | Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <img src="images/header4.png" alt="Our Wedding Day Hub" class="header-image">
  </header>

  <nav class="top-nav">
    <a href="index.html">Home</a>
    <a href="about.html">Our Story</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Enquiries</a>

    <div class="dropdown">
      <a href="#">Legal ▾</a>
      <div class="dropdown-content">
        <a href="terms.html">Terms &amp; Conditions</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="refund-policy.html">Refund Policy</a>
      </div>
    </div>

    <a href="signup.html" class="nav-cta">Join</a>
    <a href="login.html">Log In</a>
  </nav>

  <section class="contact-page">
    <div class="contact-header">
      <h1>Enquiries</h1>
      <p>Have questions or need help? We’d love to hear from you.</p>
    </div>

    <div class="contact-form-wrap">
      <form id="contact-form" class="contact-form">
        <div class="form-group half">
          <input type="text" id="name" placeholder=" " required>
          <label for="name">Your Name</label>
        </div>

        <div class="form-group half">
          <input type="email" id="email" placeholder=" " required>
          <label for="email">Email</label>
        </div>

        <div class="form-group">
          <textarea id="message" placeholder=" " required></textarea>
          <label for="message">Message</label>
        </div>

        <button type="submit" class="contact-submit">Send Message</button>
        <p class="contact-success">Message sent. Thank you.</p>
      </form>
    </div>
  </section>

  <footer class="site-footer">
    <p>© 2026 Our Wedding Day Hub</p>
    <p>ABN 76 688 637 041 • Australia</p>
  </footer>

  <script>
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      this.reset();
      document.querySelector('.contact-success').style.display = 'block';
    });
  </script>

</body>
</html>
