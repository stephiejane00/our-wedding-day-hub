<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <a href="index.html" class="back-link">← Back to Home</a>
  <h1>Contact Us</h1>
  <p class="tagline">We’d love to hear from you 🕊️</p>
</header>

<main class="vendor-info">

<form id="contact-form" action="https://formspree.io/f/xwvrrkwg" method="POST">

  <label>Name</label>
  <input type="text" name="name" required placeholder="Your name">

  <label>Email</label>
  <input type="email" name="email" required placeholder="you@example.com">

  <label>Message</label>
  <textarea name="message" rows="5" required placeholder="Write your message..."></textarea>

  <button type="submit" class="send-btn">Send Message 🕊️</button>

  <p class="success-msg">Your message has been sent 🕊️</p>

</form>

</main>

<footer>
  <p>
    <a href="index.html">Home</a> | 
    <a href="about.html">About Us</a>
  </p>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script>
const form = document.getElementById('contact-form');
const successMsg = document.querySelector('.success-msg');

form.addEventListener('submit', function(e) {
  e.preventDefault();

  fetch(form.action, {
    method: 'POST',
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  }).then(response => {
    if (response.ok) {
      successMsg.style.display = 'block';
      form.reset();
      setTimeout(() => successMsg.style.display = 'none', 4000);
    }
  });
});
</script>

</body>
</html>
