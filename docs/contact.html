<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enquiries | Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
<style>
body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background-color: #fffafc;
  color: #333;
  margin: 0;
}

.top-nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 28px;
  padding: 18px 20px;
  background: #fffaf6;
  border-bottom: 1px solid #e8ddd2;
  flex-wrap: wrap;
}

.top-nav a {
  text-decoration: none;
  color: #111;
  font-size: 0.95rem;
  letter-spacing: 0.5px;
  transition: 0.25s;
  position: relative;
}

.top-nav a::after {
  content: "";
  position: absolute;
  width: 0;
  height: 1px;
  bottom: -4px;
  left: 0;
  background: #000;
  transition: width 0.25s;
}

.top-nav a:hover::after {
  width: 100%;
}

.nav-cta {
  background: #000;
  color: #fff !important;
  padding: 8px 16px;
  border-radius: 3px;
}

.nav-cta:hover {
  background: #333;
}

.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  top: 28px;
  left: 0;
  background: #fffaf6;
  min-width: 220px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  padding: 10px 0;
  z-index: 100;
  border: 1px solid #e8ddd2;
}

.dropdown-content a {
  display: block;
  padding: 10px 16px;
  font-size: 0.9rem;
  white-space: nowrap;
}

.dropdown-content a:hover {
  background: #f4eee8;
}

.dropdown:hover .dropdown-content {
  display: block;
}

.hero {
  text-align: center;
}

.hero img {
  width: 100%;
  height: auto;
  display: block;
}

.page-header {
  text-align: center;
  padding: 30px 20px 10px 20px;
}

.page-header h1 {
  font-family: 'Georgia', serif;
  font-size: 2.8rem;
  margin: 10px 0 5px 0;
  color: #5c3d4a;
}

.page-header p {
  font-style: italic;
  font-size: 1.2rem;
  color: #7a5a68;
  margin: 0 0 20px 0;
}

.vendor-info {
  max-width: 700px;
  margin: 40px auto;
  padding: 0 20px;
}

form {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  background: #fff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.05);
}

.form-group {
  flex: 1 1 100%;
  position: relative;
}

@media(min-width: 600px) {
  .form-group.half {
    flex: 1 1 calc(50% - 10px);
  }
}

label {
  position: absolute;
  top: 12px;
  left: 14px;
  color: #888;
  font-size: 1rem;
  pointer-events: none;
  transition: 0.2s all;
  background: #fffafc;
  padding: 0 4px;
}

input, textarea {
  width: 100%;
  padding: 14px;
  padding-left: 14px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 1rem;
  box-sizing: border-box;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #a6787f;
}

input:focus + label,
input:not(:placeholder-shown) + label,
textarea:focus + label,
textarea:not(:placeholder-shown) + label {
  top: -10px;
  left: 10px;
  font-size: 0.85rem;
  color: #5c3d4a;
}

button.send-btn {
  margin-top: 20px;
  padding: 16px;
  background-color: #000;
  color: #fff;
  font-size: 1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
  transition: 0.3s;
}

button.send-btn:hover {
  opacity: 0.9;
}

.success-msg {
  display: none;
  margin-top: 20px;
  color: #5c3d4a;
  font-weight: 500;
  text-align: center;
  width: 100%;
}

footer {
  text-align: center;
  padding: 30px 20px;
}

@media (max-width: 768px) {
  .top-nav {
    gap: 16px;
  }
}
</style>
</head>
<body>

<header class="hero">
  <img src="images/header4.png" alt="Our Wedding Day Hub">
</header>

<nav class="top-nav">
  <a href="index.html">Home</a>
  <a href="about.html">Our Story</a>
  <a href="pricing.html">Pricing</a>
  <a href="contact.html">Enquiries</a>

  <div class="dropdown">
    <a href="#">Legal ▾</a>
    <div class="dropdown-content">
      <a href="terms.html">Terms &amp; Conditions</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="refund-policy.html">Refund Policy</a>
    </div>
  </div>

  <a href="signup.html" class="nav-cta">Join</a>
  <a href="login.html">Log In</a>
</nav>

<section class="page-header">
  <h1>Enquiries</h1>
  <p>Have questions or need help? We're here for you 🤍</p>
</section>

<section class="vendor-info">
  <form id="contact-form">
    <div class="form-group half">
      <input type="text" id="name" placeholder=" " required>
      <label for="name">Your Name</label>
    </div>

    <div class="form-group half">
      <input type="email" id="email" placeholder=" " required>
      <label for="email">Email</label>
    </div>

    <div class="form-group">
      <textarea id="message" rows="6" placeholder=" " required></textarea>
      <label for="message">Message</label>
    </div>

    <button type="submit" class="send-btn">Send Message 🤍</button>
    <p class="success-msg">Message sent! Thank you 💌</p>
  </form>
</section>

<footer>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script>
document.getElementById('contact-form').addEventListener('submit', function(e){
  e.preventDefault();
  this.reset();
  document.querySelector('.success-msg').style.display = 'block';
});
</script>

</body>
</html>
