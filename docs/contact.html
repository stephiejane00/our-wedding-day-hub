<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <a href="index.html" class="back-link">← Back to Home</a>
  <h1>Contact Us</h1>
</header>

<main id="contact-main">
  <form id="contact-form" action="https://formspree.io/f/xwvrrkwg" method="POST">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" required placeholder="Your full name">

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required placeholder="you@example.com">

    <label for="message">Message</label>
    <textarea id="message" name="message" rows="5" required placeholder="Write your message here..."></textarea>

    <button type="submit" class="send-btn">Send Message 🕊️</button>
    <p class="success-msg">Your message has been sent! 🕊️ We’ll get back to you soon.</p>
  </form>
</main>

<footer>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script>
  const form = document.getElementById('contact-form');
  const successMsg = document.querySelector('.success-msg');

  form.addEventListener('submit', function(event) {
    event.preventDefault();
    const formData = new FormData(form);

    fetch(form.action, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    })
    .then(response => {
      if (response.ok) {
        successMsg.style.display = 'block';
        form.reset();
        setTimeout(() => { successMsg.style.display = 'none'; }, 5000);
      } else {
        alert('Oops! Something went wrong.');
      }
    })
    .catch(error => { alert('Oops! Something went wrong.'); });
  });
</script>

</body>
</html>
