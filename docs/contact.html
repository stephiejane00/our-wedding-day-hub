<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <a href="index.html" class="back-link">← Back to Home</a>
  <h1 class="page-header">Contact Us</h1>
</header>

<main class="vendor-info">
  <p>Have a question or want to get in touch? Fill out the form below and we’ll get back to you as soon as possible.</p>

  <form action="https://formspree.io/f/xwvrrkwg" method="POST" class="contact-form">
    <p>
      <label for="name">Your Name</label><br>
      <input type="text" name="name" id="name" required style="width:90%; max-width:500px; padding:10px; margin-top:5px; border:2px solid #2F4F2F; border-radius:8px;">
    </p>

    <p>
      <label for="email">Your Email</label><br>
      <input type="email" name="email" id="email" required style="width:90%; max-width:500px; padding:10px; margin-top:5px; border:2px solid #2F4F2F; border-radius:8px;">
    </p>

    <p>
      <label for="message">Message</label><br>
      <textarea name="message" id="message" rows="6" required style="width:90%; max-width:500px; padding:10px; margin-top:5px; border:2px solid #2F4F2F; border-radius:8px;"></textarea>
    </p>

    <p>
      <button type="submit">Send Message</button>
    </p>
  </form>
</main>

<footer>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

</body>
</html>
