<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="page-header" style="text-align:center;">
  <h1>Contact Our Wedding Day Hub</h1>
  <p>Have questions or need help? We're here for you!</p>
</header>

<section class="vendor-info">
<form id="contact-form">
  <label for="name">Your Name</label>
  <input type="text" id="name" placeholder="Enter your name">

  <label for="email">Email</label>
  <input type="email" id="email" placeholder="Enter your email">

  <label for="message">Message</label>
  <textarea id="message" rows="6" placeholder="Write your message here"></textarea>

  <button type="submit" class="send-btn">Send Message 🤍</button>
  <p class="success-msg">Message sent! Thank you 💌</p>
</form>
</section>

<footer>
<p>© 2026 Our Wedding Day Hub</p>
</footer>

<script>
document.getElementById('contact-form').addEventListener('submit', function(e){
  e.preventDefault();
  this.reset();
  document.querySelector('.success-msg').style.display = 'block';
});
</script>

</body>
</html>
