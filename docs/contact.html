<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background-color: #fffafc;
    color: #333;
    margin: 0;
  }

  /* Hero header */
  .hero {
    text-align: center;
    padding: 20px;
  }

  .hero img {
    width: 100%;
    height: auto;
    display: block;
    margin: 0 auto 20px auto;
  }

  .hero h1 {
    font-family: 'Georgia', serif;
    font-size: 2.8rem;
    margin: 10px 0 5px 0;
    color: #5c3d4a;
  }

  .hero p {
    font-style: italic;
    font-size: 1.2rem;
    color: #7a5a68;
    margin: 0 0 20px 0;
  }

  /* Contact form */
  .vendor-info {
    max-width: 700px;
    margin: 40px auto;
    padding: 0 20px;
  }

  form {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
  }

  .form-group {
    flex: 1 1 100%;
    position: relative;
  }

  /* Two-column for name/email on larger screens */
  @media(min-width: 600px) {
    .form-group.half {
      flex: 1 1 calc(50% - 10px);
    }
  }

  label {
    position: absolute;
    top: 12px;
    left: 14px;
    color: #888;
    font-size: 1rem;
    pointer-events: none;
    transition: 0.2s all;
    background: #fffafc;
    padding: 0 4px;
  }

  input, textarea {
    width: 100%;
    padding: 14px;
    padding-left: 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 1rem;
    box-sizing: border-box;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: #a6787f;
  }

  /* Floating label effect */
  input:focus + label,
  input:not(:placeholder-shown) + label,
  textarea:focus + label,
  textarea:not(:placeholder-shown) + label {
    top: -10px;
    left: 10px;
    font-size: 0.85rem;
    color: #5c3d4a;
  }

  button.send-btn {
    margin-top: 20px;
    padding: 16px;
    background-color: #a6787f;
    color: #fff;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    transition: 0.3s;
  }

  button.send-btn:hover {
    background-color: #8b5c68;
  }

  .success-msg {
    display: none;
    margin-top: 20px;
    color: #5c3d4a;
    font-weight: 500;
    text-align: center;
  }

  footer {
    text-align: center;
    padding: 40px 20px;
    font-size: 0.9rem;
    color: #888;
  }
</style>
</head>
<body>

<header class="hero">
  <img src="images/header4.png" alt="Our Wedding Day Hub">
  <h1>Contact Us</h1>
  <p>Have questions or need help? We're here for you 🤍</p>
</header>

<section class="vendor-info">
<form id="contact-form">
  <div class="form-group half">
    <input type="text" id="name" placeholder=" " required>
    <label for="name">Your Name</label>
  </div>

  <div class="form-group half">
    <input type="email" id="email" placeholder=" " required>
    <label for="email">Email</label>
  </div>

  <div class="form-group">
    <textarea id="message" rows="6" placeholder=" " required></textarea>
    <label for="message">Message</label>
  </div>

  <button type="submit" class="send-btn">Send Message 🤍</button>
  <p class="success-msg">Message sent! Thank you 💌</p>
</form>
</section>

<footer>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script>
document.getElementById('contact-form').addEventListener('submit', function(e){
  e.preventDefault();
  this.reset();
  document.querySelector('.success-msg').style.display = 'block';
});
</script>

</body>
</html>
