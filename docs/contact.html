<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiries | Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <img src="images/header4.png" alt="Our Wedding Day Hub" class="header-image">
  </header>

  <nav class="top-nav">
    <a href="index.html">Home</a>
    <a href="about.html">Our Story</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Enquiries</a>

    <div class="dropdown">
      <a href="#">Legal ▾</a>
      <div class="dropdown-content">
        <a href="terms.html">Terms &amp; Conditions</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="refund-policy.html">Refund Policy</a>
      </div>
    </div>

    <a href="signup.html" class="nav-cta">Join</a>
    <a href="login.html" id="loginLink">Log In</a>
    <a href="dashboard.html" id="dashboardLink" style="display:none;">Dashboard</a>
    <a href="#" id="logoutLink" style="display:none;">Logout</a>
  </nav>

  <section class="contact-page">
    <div class="contact-header">
      <h1>Enquiries</h1>
      <p>Have questions or need help? We’d love to hear from you.</p>
    </div>

    <div class="contact-form-wrap">
      <form id="contact-form" class="contact-form" action="https://formspree.io/f/xaqlwjro" method="POST">
        <div class="form-group half">
          <input type="text" id="name" name="name" placeholder=" " required>
          <label for="name">Your Name</label>
        </div>

        <div class="form-group half">
          <input type="email" id="email" name="email" placeholder=" " required>
          <label for="email">Email</label>
        </div>

        <div class="form-group">
          <textarea id="message" name="message" placeholder=" " required></textarea>
          <label for="message">Message</label>
        </div>

        <button type="submit" class="contact-submit">Send Message</button>
        <p class="contact-success" style="display:none;">Message sent. Thank you.</p>
      </form>
    </div>
  </section>

  <footer class="site-footer">
    <p>© 2026 Our Wedding Day Hub</p>
    <p>ABN 76 688 637 041 • Australia</p>
  </footer>

  <script>
    const form = document.getElementById('contact-form');
    const successMessage = document.querySelector('.contact-success');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      const formData = new FormData(form);

      const response = await fetch(form.action, {
        method: form.method,
        body: formData,
        headers: {
          'Accept': 'application/json'
        }
      });

      if (response.ok) {
        form.reset();
        successMessage.style.display = 'block';
      } else {
        alert('Oops! There was a problem sending your message.');
      }
    });
  </script>

  <script type="module" src="nav.js"></script>

</body>
</html>
