<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background-color: #fffafc;
    color: #333;
    margin: 0;
  }

  .top-nav {
    max-width: 1200px;
    margin: 22px auto 10px auto;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .top-nav-left,
  .top-nav-right {
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }

  .top-nav a {
    text-decoration: none;
    font-size: 0.95rem;
    transition: all 0.3s ease;
  }

  .top-nav-left a {
    color: #000;
    padding: 4px 0;
    border: none;
    background: transparent;
    position: relative;
  }

  .top-nav-left a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -3px;
    width: 0;
    height: 1px;
    background: #000;
    transition: width 0.3s ease;
  }

  .top-nav-left a:hover::after {
    width: 100%;
  }

  .nav-button {
    display: inline-block;
    background: #000;
    color: #fff !important;
    padding: 10px 18px;
    text-decoration: none;
    font-size: 0.9rem;
    border: 1px solid #000;
    transition: all 0.3s ease;
  }

  .nav-button:hover {
    transform: translateY(-1px);
  }

  .nav-button.outline {
    background: #fff;
    color: #000 !important;
    border: 1px solid #000;
  }

  .nav-button.outline:hover {
    background: #000;
    color: #fff !important;
  }

  .hero {
    text-align: center;
  }

  .hero img {
    width: 100%;
    height: auto;
    display: block;
  }

  .page-header {
    text-align: center;
    padding: 30px 20px 10px 20px;
  }

  .page-header h1 {
    font-family: 'Georgia', serif;
    font-size: 2.8rem;
    margin: 10px 0 5px 0;
    color: #5c3d4a;
  }

  .page-header p {
    font-style: italic;
    font-size: 1.2rem;
    color: #7a5a68;
    margin: 0 0 20px 0;
  }

  .vendor-info {
    max-width: 700px;
    margin: 40px auto;
    padding: 0 20px;
  }

  form {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    background: #fff;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.05);
  }

  .form-group {
    flex: 1 1 100%;
    position: relative;
  }

  @media(min-width: 600px) {
    .form-group.half {
      flex: 1 1 calc(50% - 10px);
    }
  }

  label {
    position: absolute;
    top: 12px;
    left: 14px;
    color: #888;
    font-size: 1rem;
    pointer-events: none;
    transition: 0.2s all;
    background: #fffafc;
    padding: 0 4px;
  }

  input, textarea {
    width: 100%;
    padding: 14px;
    padding-left: 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 1rem;
    box-sizing: border-box;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: #a6787f;
  }

  input:focus + label,
  input:not(:placeholder-shown) + label,
  textarea:focus + label,
  textarea:not(:placeholder-shown) + label {
    top: -10px;
    left: 10px;
    font-size: 0.85rem;
    color: #5c3d4a;
  }

  button.send-btn {
    margin-top: 20px;
    padding: 16px;
    background-color: #000;
    color: #fff;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    transition: 0.3s;
  }

  button.send-btn:hover {
    opacity: 0.9;
  }

  .success-msg {
    display: none;
    margin-top: 20px;
    color: #5c3d4a;
    font-weight: 500;
    text-align: center;
    width: 100%;
  }

  footer {
    text-align: center;
    padding: 30px 20px;
  }

  @media (max-width: 768px) {
    .top-nav {
      flex-direction: column;
      align-items: center;
    }

    .top-nav-left,
    .top-nav-right {
      justify-content: center;
    }
  }
</style>
</head>
<body>

<header class="hero">
  <img src="images/header4.png" alt="Our Wedding Day Hub">
</header>

<nav class="top-nav">
  <div class="top-nav-left">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html">Contact Us</a>
    <a href="terms.html">Terms &amp; Conditions</a>
    <a href="privacy.html">Privacy Policy</a>
    <a href="refund-policy.html">Refund Policy</a>
  </div>

  <div class="top-nav-right">
    <a href="signup.html" class="nav-button">Sign Up</a>
    <a href="login.html" class="nav-button outline">Log In</a>
  </div>
</nav>

<section class="page-header">
  <h1>Contact Us</h1>
  <p>Have questions or need help? We're here for you 🤍</p>
</section>

<section class="vendor-info">
  <form id="contact-form">
    <div class="form-group half">
      <input type="text" id="name" placeholder=" " required>
      <label for="name">Your Name</label>
    </div>

    <div class="form-group half">
      <input type="email" id="email" placeholder=" " required>
      <label for="email">Email</label>
    </div>

    <div class="form-group">
      <textarea id="message" rows="6" placeholder=" " required></textarea>
      <label for="message">Message</label>
    </div>

    <button type="submit" class="send-btn">Send Message</button>
    <p class="success-msg">Message sent! Thank you 💌</p>
  </form>
</section>

<footer>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script>
document.getElementById('contact-form').addEventListener('submit', function(e){
  e.preventDefault();
  this.reset();
  document.querySelector('.success-msg').style.display = 'block';
});
</script>

</body>
</html>
