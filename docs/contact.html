<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
  <a href="index.html" class="back-link">← Back to Home</a>
  <h1>Contact Us</h1>
  <p class="tagline">We’d love to hear from you!</p>
</header>

<main class="vendor-info">

  <form id="contact-form" action="https://formspree.io/f/xwvrrkwg" method="POST">
    
    <label for="name">Your Name</label>
    <input type="text" id="name" name="name" placeholder="Your name" required>
    
    <label for="email">Email</label>
    <input type="email" id="email" name="_replyto" placeholder="you@example.com" required>
    
    <label for="message">Message</label>
    <textarea id="message" name="message" placeholder="Write your message..." rows="5" required></textarea>
    
    <button type="submit" class="send-btn">💌 Send Message</button>
    
    <p id="success-message" class="success-msg">Your message has been sent! 💖</p>
    
  </form>

</main>

<footer>
  <p>© 2026 Our Wedding Day Hub</p>
</footer>

<script>
  const form = document.getElementById('contact-form');
  const successMsg = document.getElementById('success-message');

  form.addEventListener('submit', (e) => {
    e.preventDefault(); // Prevent default form submission
    fetch(form.action, {
      method: form.method,
      body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    }).then(response => {
      if (response.ok) {
        successMsg.style.display = 'block';
        form.reset();
        setTimeout(() => successMsg.style.display = 'none', 5000); // hide after 5s
      } else {
        alert("Oops! There was a problem submitting your form.");
      }
    });
  });
</script>

</body>
</html>
