<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vendor Profile | Our Wedding Day Hub</title>
<link rel="stylesheet" href="style.css" />

<style>
:root{
--bg:#fffaf6;
--card:#ffffff;
--text:#2f2a26;
--muted:#7d7169;
--line:#eadfd6;
--soft:#e8ddd4;
--soft-2:#f8f3ef;
--accent-soft:#faf1f4;
--shadow:0 12px 28px rgba(62,44,34,0.06);
--radius-xl:28px;
--radius-pill:999px;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:"Helvetica Neue",Arial,sans-serif;
}

.page-auth{
max-width:1240px;
margin:0 auto;
padding:12px 22px 0;
display:flex;
justify-content:flex-end;
gap:22px;
}

.auth-link,.auth-button{
background:none;
border:none;
color:var(--text);
text-decoration:none;
font-size:1rem;
cursor:pointer;
}

.auth-pill{
background:var(--soft);
padding:12px 20px;
border-radius:999px;
}

.hero{
text-align:center;
padding:12px 20px 18px;
}

.header-image{
max-width:420px;
width:100%;
margin:auto;
display:block;
}

.vendor-layout{
max-width:1240px;
margin:20px auto;
padding:0 22px;
display:grid;
grid-template-columns:1.6fr 360px;
gap:28px;
}

.card{
background:white;
border-radius:28px;
border:1px solid var(--line);
box-shadow:var(--shadow);
}

.gallery-card{padding:18px;}

.main-gallery-image{
width:100%;
height:560px;
object-fit:cover;
border-radius:22px;
}

.gallery-arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
width:44px;
height:44px;
border-radius:50%;
border:none;
background:white;
cursor:pointer;
}

.gallery-arrow.left{left:10px;}
.gallery-arrow.right{right:10px;}

.content-card{padding:30px;}

.vendor-title{
font-size:2rem;
font-weight:600;
}

.category-line{
color:var(--muted);
margin-top:6px;
}

.sidebar-card{
padding:28px 22px;
background:linear-gradient(#fff,#fdf9f6);
text-align:center;
}

.profile-pic-wrap{
width:160px;
height:160px;
border-radius:50%;
overflow:hidden;
margin:auto;
}

.profile-pic{width:100%;height:100%;object-fit:cover;}

.favorite-btn{
width:100%;
border-radius:999px;
padding:14px;
border:1px solid #ead8de;
background:#fff;
cursor:pointer;
margin:14px 0;
display:flex;
justify-content:center;
gap:8px;
}

.contact-stack{
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:14px;
}

.stack-btn{
padding:12px;
border-radius:999px;
background:#f8f3ef;
text-decoration:none;
color:var(--text);
border:1px solid #e7dbd1;
}

.sidebar-location{
padding:16px;
border-radius:18px;
background:#f8f3ef;
}

.sidebar-location-list{
display:flex;
flex-wrap:wrap;
gap:8px;
}

.sidebar-location-pill{
padding:8px 12px;
border-radius:999px;
background:white;
border:1px solid #e7dbd1;
font-size:0.9rem;
}
</style>
</head>

<body>

<div class="page-auth">
<a href="signup.html" id="joinLink" class="auth-link auth-pill">Join</a>
<a href="index.html" class="auth-link">Home</a>
<a href="login.html" id="loginLink" class="auth-link">Log In</a>
<a href="dashboard.html" id="dashboardLink" class="auth-link" style="display:none;">Dashboard</a>
<button id="logoutLink" class="auth-button" style="display:none;">Log Out</button>
</div>

<header class="hero">
<img src="images/header4.png" class="header-image">
</header>

<main class="vendor-layout">

<section>

<div class="card gallery-card">
<img id="mainGalleryImage" class="main-gallery-image">
</div>

<div class="card content-card">
<h1 id="businessName" class="vendor-title"></h1>
<div id="vendorCategory" class="category-line"></div>

<h3>About</h3>
<p id="vendorAbout"></p>
</div>

</section>

<aside class="card sidebar-card">

<div class="profile-pic-wrap">
<img id="profilePic" class="profile-pic">
</div>

<button id="favoriteBtn" class="favorite-btn"></button>

<div class="contact-stack">
<a id="websiteBtn" class="stack-btn">Website</a>
<a id="emailBtn" class="stack-btn">Contact</a>
<a id="instagramBtn" class="stack-btn">Instagram</a>
</div>

<div class="sidebar-location">
<h4>Locations</h4>
<div id="sidebarLocationList" class="sidebar-location-list"></div>
</div>

</aside>

</main>

<script type="module">
import {db,doc,getDoc} from "./firebase.js";

function formatText(value){
if(!value) return "";
return String(value)
.replace(/_/g," ")
.replace(/-/g," ")
.replace(/\b\w/g,l=>l.toUpperCase());
}

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

async function loadVendor(){
const snap=await getDoc(doc(db,"vendors",id));
const v=snap.data();

document.getElementById("businessName").textContent=formatText(v.businessName);

const cats=(v.categories||[]).map(formatText).join(" • ");
document.getElementById("vendorCategory").textContent=cats;

document.getElementById("vendorAbout").textContent=v.bio||"";

document.getElementById("profilePic").src=v.profileImage||"";

document.getElementById("websiteBtn").href=v.website||"#";
document.getElementById("instagramBtn").href=v.instagram||"#";
document.getElementById("emailBtn").href="mailto:"+v.email;

const locWrap=document.getElementById("sidebarLocationList");
locWrap.innerHTML="";
(v.regions||[]).forEach(l=>{
const div=document.createElement("div");
div.className="sidebar-location-pill";
div.textContent=formatText(l);
locWrap.appendChild(div);
});
}

loadVendor();

const favBtn=document.getElementById("favoriteBtn");
favBtn.innerHTML="♡ Save to favourites";
</script>

</body>
</html>
