<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Profile | Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- AUTH -->
  <div class="page-auth">
    <a href="index.html" class="auth-link auth-pill">Home</a>

    <a href="signup.html" id="joinLink" class="auth-link auth-pill">Join</a>
    <a href="login.html" id="loginLink" class="auth-link">Log In</a>

    <a href="dashboard.html" id="dashboardLink" class="auth-link auth-pill" style="display:none;">Dashboard</a>
    <button id="logoutLink" class="auth-button" style="display:none;">Log Out</button>
  </div>

  <!-- HEADER -->
  <header class="hero">
    <img src="images/header4.png" alt="Our Wedding Day Hub" class="header-image">
  </header>

  <!-- MAIN -->
  <main class="vendor-profile">

    <div class="vendor-top">
      <h1 id="businessName">Business Name</h1>

      <!-- ❤️ HEART BUTTON -->
      <button id="favoriteBtn" class="favorite-btn">♡ Save</button>
    </div>

    <p id="vendorLocation">Location</p>
    <p id="vendorCategory">Category</p>

    <div class="vendor-section">
      <h2>About</h2>
      <p id="vendorBio">Vendor bio will go here.</p>
    </div>

    <div class="vendor-section">
      <h2>Contact</h2>
      <a id="emailBtn">Email</a>
      <a id="instagramBtn">Instagram</a>
      <a id="websiteBtn">Website</a>
    </div>

    <div class="vendor-section">
      <h2>Gallery</h2>
      <img id="g1">
      <img id="g2">
      <img id="g3">
    </div>

  </main>

  <footer>
    © Our Wedding Day Hub | ABN: 76688637041
  </footer>

  <!-- SCRIPT -->
  <script>
    const vendorId = "demo";

    /* ❤️ FAVORITES */
    const favBtn = document.getElementById("favoriteBtn");

    function getFavs() {
      return JSON.parse(localStorage.getItem("favs")) || [];
    }

    function setFavs(f) {
      localStorage.setItem("favs", JSON.stringify(f));
    }

    function updateFav() {
      const favs = getFavs();
      if (favs.includes(vendorId)) {
        favBtn.innerHTML = "♥ Saved";
      } else {
        favBtn.innerHTML = "♡ Save";
      }
    }

    favBtn.onclick = () => {
      let favs = getFavs();
      if (favs.includes(vendorId)) {
        favs = favs.filter(x => x !== vendorId);
      } else {
        favs.push(vendorId);
      }
      setFavs(favs);
      updateFav();
    };

    updateFav();

    /* 🔐 AUTH */
    function isLoggedIn() {
      return localStorage.getItem("loggedIn") === "true";
    }

    function updateAuth() {
      const loggedIn = isLoggedIn();

      document.getElementById("joinLink").style.display = loggedIn ? "none" : "inline-block";
      document.getElementById("loginLink").style.display = loggedIn ? "none" : "inline-block";

      document.getElementById("dashboardLink").style.display = loggedIn ? "inline-block" : "none";
      document.getElementById("logoutLink").style.display = loggedIn ? "inline-block" : "none";
    }

    document.getElementById("logoutLink").onclick = () => {
      localStorage.removeItem("loggedIn");
      updateAuth();
      window.location.href = "index.html";
    };

    updateAuth();

    /* DEMO DATA */
    const vendor = {
      name: "Kaity Kissed Nails & Designs",
      category: "Beauty",
      location: "Brisbane",
      bio: "Beautiful bridal nails designed with care.",
      email: "hello@email.com",
      instagram: "#",
      website: "#",
      images: [
        "images/placeholder1.jpg",
        "images/placeholder2.jpg",
        "images/placeholder3.jpg"
      ]
    };

    document.getElementById("businessName").innerText = vendor.name;
    document.getElementById("vendorCategory").innerText = vendor.category;
    document.getElementById("vendorLocation").innerText = vendor.location;
    document.getElementById("vendorBio").innerText = vendor.bio;

    document.getElementById("emailBtn").href = "mailto:" + vendor.email;
    document.getElementById("instagramBtn").href = vendor.instagram;
    document.getElementById("websiteBtn").href = vendor.website;

    document.getElementById("g1").src = vendor.images[0];
    document.getElementById("g2").src = vendor.images[1];
    document.getElementById("g3").src = vendor.images[2];
  </script>

</body>
</html>
