<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vendor Profile | Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <div class="page-auth">
    <a href="index.html" class="auth-link">Home</a>
    <a href="login.html" id="loginLink" class="auth-link">Log In</a>
    <a href="dashboard.html" id="dashboardLink" class="auth-link" style="display:none;">Dashboard</a>
    <button id="logoutLink" class="auth-button" style="display:none;">Log Out</button>
  </div>

  <header class="hero">
    <img src="images/header4.png" alt="Our Wedding Day Hub" class="header-image">
  </header>

  <main class="vendor-page">
    <div class="vendor-layout">

      <section>
        <div class="card gallery-card">
          <div class="vendor-slideshow">
            <button type="button" id="prevImageBtn" class="gallery-arrow gallery-arrow-left" aria-label="Previous image">‹</button>
            <img id="mainImage" class="main-image" src="images/header4.png" alt="Vendor gallery image">
            <button type="button" id="nextImageBtn" class="gallery-arrow gallery-arrow-right" aria-label="Next image">›</button>
          </div>

          <div id="thumbnailRow" class="thumbnail-row"></div>
        </div>

        <div class="card content-card">
          <h1 id="businessName">Loading vendor...</h1>
          <p id="vendorCategory"></p>
          <p id="vendorAbout"></p>
        </div>
      </section>

      <aside class="card sidebar-card">
        <div class="profile-pic-wrap">
          <img id="profilePic" class="profile-pic" src="" alt="Vendor profile image">
        </div>

        <h2 id="sidebarBusinessName">Loading vendor...</h2>

        <p id="sidebarLocation"></p>
        <p id="sidebarServiceAreas"></p>

        <button id="favoriteBtn" class="favorite-btn">♡ Save to favourites</button>

        <div class="contact-stack">
          <a id="websiteBtn" class="stack-btn" target="_blank" rel="noopener noreferrer">Website</a>
          <a id="emailBtn" class="stack-btn">Contact Vendor</a>
          <a id="instagramBtn" class="stack-btn" target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>

        <div id="statusMessage"></div>
      </aside>

    </div>
  </main>

  <footer>
    © Our Wedding Day Hub
  </footer>

  <script type="module">
    import {
      db,
      auth,
      doc,
      getDoc,
      onAuthStateChanged,
      signOut
    } from "./firebase.js";

    const params = new URLSearchParams(window.location.search);
    const vendorId = params.get("id");

    const businessNameEl = document.getElementById("businessName");
    const sidebarBusinessNameEl = document.getElementById("sidebarBusinessName");
    const vendorCategoryEl = document.getElementById("vendorCategory");
    const vendorAboutEl = document.getElementById("vendorAbout");
    const profilePicEl = document.getElementById("profilePic");

    const sidebarLocationEl = document.getElementById("sidebarLocation");
    const sidebarServiceAreasEl = document.getElementById("sidebarServiceAreas");

    const mainImage = document.getElementById("mainImage");
    const thumbnailRow = document.getElementById("thumbnailRow");
    const prevImageBtn = document.getElementById("prevImageBtn");
    const nextImageBtn = document.getElementById("nextImageBtn");

    const websiteBtn = document.getElementById("websiteBtn");
    const emailBtn = document.getElementById("emailBtn");
    const instagramBtn = document.getElementById("instagramBtn");

    const favoriteBtn = document.getElementById("favoriteBtn");
    const statusMessage = document.getElementById("statusMessage");

    const loginLink = document.getElementById("loginLink");
    const dashboardLink = document.getElementById("dashboardLink");
    const logoutLink = document.getElementById("logoutLink");

    const favoritesKey = "favoriteVendors";

    let galleryImages = [];
    let currentImageIndex = 0;

    function cleanArray(arr) {
      return Array.isArray(arr) ? arr.filter(Boolean) : [];
    }

    function formatText(value) {
      if (!value) return "";
      return String(value)
        .replace(/_/g, " ")
        .replace(/-/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function getFavorites() {
      return JSON.parse(localStorage.getItem(favoritesKey)) || [];
    }

    function saveFavorites(favs) {
      localStorage.setItem(favoritesKey, JSON.stringify(favs));
    }

    function updateFavoriteButton(id) {
      const favs = getFavorites();
      if (favs.includes(id)) {
        favoriteBtn.innerHTML = "♥ Saved";
        favoriteBtn.classList.add("saved");
      } else {
        favoriteBtn.innerHTML = "♡ Save to favourites";
        favoriteBtn.classList.remove("saved");
      }
    }

    favoriteBtn.addEventListener("click", () => {
      if (!vendorId) return;

      let favs = getFavorites();

      if (favs.includes(vendorId)) {
        favs = favs.filter(id => id !== vendorId);
        statusMessage.textContent = "Removed from favourites.";
      } else {
        favs.push(vendorId);
        statusMessage.textContent = "Saved to favourites.";
      }

      saveFavorites(favs);
      updateFavoriteButton(vendorId);
    });

    function setMainImage(index) {
      if (!galleryImages.length) return;

      currentImageIndex = index;
      mainImage.src = galleryImages[currentImageIndex];

      const thumbs = thumbnailRow.querySelectorAll(".thumbnail");
      thumbs.forEach((thumb, thumbIndex) => {
        if (thumbIndex === currentImageIndex) {
          thumb.classList.add("active");
        } else {
          thumb.classList.remove("active");
        }
      });

      const hasMultiple = galleryImages.length > 1;
      prevImageBtn.style.display = hasMultiple ? "inline-flex" : "none";
      nextImageBtn.style.display = hasMultiple ? "inline-flex" : "none";
    }

    function showPreviousImage() {
      if (galleryImages.length <= 1) return;
      const newIndex = currentImageIndex === 0 ? galleryImages.length - 1 : currentImageIndex - 1;
      setMainImage(newIndex);
    }

    function showNextImage() {
      if (galleryImages.length <= 1) return;
      const newIndex = currentImageIndex === galleryImages.length - 1 ? 0 : currentImageIndex + 1;
      setMainImage(newIndex);
    }

    prevImageBtn.addEventListener("click", showPreviousImage);
    nextImageBtn.addEventListener("click", showNextImage);

    function renderGallery(vendor) {
      galleryImages = [];

      if (vendor.coverImageUrl && String(vendor.coverImageUrl).trim()) {
        galleryImages.push(vendor.coverImageUrl);
      }

      if (Array.isArray(vendor.images) && vendor.images.length) {
        vendor.images.forEach((img) => {
          if (img && String(img).trim() && !galleryImages.includes(img)) {
            galleryImages.push(img);
          }
        });
      }

      if (vendor.profileImageUrl && String(vendor.profileImageUrl).trim() && !galleryImages.includes(vendor.profileImageUrl)) {
        galleryImages.push(vendor.profileImageUrl);
      }

      if (!galleryImages.length) {
        galleryImages = ["images/header4.png"];
      }

      thumbnailRow.innerHTML = "";

      galleryImages.forEach((img, index) => {
        const thumb = document.createElement("img");
        thumb.src = img;
        thumb.className = "thumbnail";
        thumb.alt = `Gallery image ${index + 1}`;

        thumb.addEventListener("click", () => {
          setMainImage(index);
        });

        thumbnailRow.appendChild(thumb);
      });

      setMainImage(0);
    }

    async function loadVendor() {
      if (!vendorId) {
        businessNameEl.textContent = "Vendor not found";
        sidebarBusinessNameEl.textContent = "Vendor not found";
        return;
      }

      try {
        const snap = await getDoc(doc(db, "vendors", vendorId));

        if (!snap.exists()) {
          businessNameEl.textContent = "Vendor not found";
          sidebarBusinessNameEl.textContent = "Vendor not found";
          return;
        }

        const v = snap.data();

        const name = v.businessName || "Vendor";
        const category = Array.isArray(v.categories) && v.categories.length
          ? v.categories.map(formatText).join(" • ")
          : formatText(v.category || "");
        const about = v.bio || v.shortBio || v.description || "Beautiful vendor profile coming soon.";
        const profileImage =
          v.profileImageUrl ||
          v.logoUrl ||
          v.coverImageUrl ||
          (Array.isArray(v.images) && v.images.length ? v.images[0] : "");

        const serviceAreas = v.serviceAreas ? formatText(v.serviceAreas) : "";
        const displayLocation = v.displayLocation ? formatText(v.displayLocation) : "";
        const regions = cleanArray(v.regions).map(formatText).join(" • ");
        const states = cleanArray(v.states).map(formatText).join(" • ");
        const countries = cleanArray(v.countries).map(formatText).join(" • ");

        businessNameEl.textContent = name;
        sidebarBusinessNameEl.textContent = name;
        vendorCategoryEl.textContent = category;
        vendorAboutEl.textContent = about;

        if (profileImage) {
          profilePicEl.src = profileImage;
        } else {
          profilePicEl.style.display = "none";
        }

        const locationLine = displayLocation || regions || states || countries;
        if (locationLine) {
          sidebarLocationEl.textContent = locationLine;
        } else {
          sidebarLocationEl.style.display = "none";
        }

        if (serviceAreas) {
          sidebarServiceAreasEl.textContent = serviceAreas;
        } else {
          sidebarServiceAreasEl.style.display = "none";
        }

        renderGallery(v);

        if (v.website) {
          websiteBtn.href = v.website;
        } else {
          websiteBtn.style.display = "none";
        }

        if (v.email || v.contactEmail) {
          emailBtn.href = "mailto:" + (v.email || v.contactEmail);
        } else {
          emailBtn.style.display = "none";
        }

        if (v.instagram) {
          instagramBtn.href = v.instagram;
        } else {
          instagramBtn.style.display = "none";
        }

        updateFavoriteButton(vendorId);
      } catch (error) {
        console.error("Error loading vendor:", error);
        businessNameEl.textContent = "There was a problem loading this vendor";
        sidebarBusinessNameEl.textContent = "Vendor profile";
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginLink.style.display = "none";
        dashboardLink.style.display = "inline-block";
        logoutLink.style.display = "inline-block";
      } else {
        loginLink.style.display = "inline-block";
        dashboardLink.style.display = "none";
        logoutLink.style.display = "none";
      }
    });

    logoutLink.addEventListener("click", async () => {
      try {
        await signOut(auth);
        window.location.href = "index.html";
      } catch (error) {
        console.error("Logout failed:", error);
      }
    });

    loadVendor();
  </script>

</body>
</html>
