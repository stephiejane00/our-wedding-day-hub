<script type="module">
import {
  db,
  auth,
  doc,
  getDoc
} from "./firebase.js";

const params = new URLSearchParams(window.location.search);
const vendorId = params.get("id");

const businessNameEl = document.getElementById("businessName");
const sidebarBusinessNameEl = document.getElementById("sidebarBusinessName");
const vendorCategoryEl = document.getElementById("vendorCategory");
const vendorAboutEl = document.getElementById("vendorAbout");
const profilePicEl = document.getElementById("profilePic");

const websiteBtn = document.getElementById("websiteBtn");
const emailBtn = document.getElementById("emailBtn");
const instagramBtn = document.getElementById("instagramBtn");

const favoriteBtn = document.getElementById("favoriteBtn");
const statusMessage = document.getElementById("statusMessage");

const favoritesKey = "favoriteVendors";

function getFavorites() {
  return JSON.parse(localStorage.getItem(favoritesKey)) || [];
}

function saveFavorites(favs) {
  localStorage.setItem(favoritesKey, JSON.stringify(favs));
}

function updateFavoriteButton(id) {
  const favs = getFavorites();
  if (favs.includes(id)) {
    favoriteBtn.innerHTML = "♥ Saved";
    favoriteBtn.classList.add("saved");
  } else {
    favoriteBtn.innerHTML = "♡ Save to favourites";
    favoriteBtn.classList.remove("saved");
  }
}

favoriteBtn.addEventListener("click", () => {
  let favs = getFavorites();

  if (favs.includes(vendorId)) {
    favs = favs.filter(id => id !== vendorId);
  } else {
    favs.push(vendorId);
  }

  saveFavorites(favs);
  updateFavoriteButton(vendorId);
});

async function loadVendor() {
  if (!vendorId) return;

  const snap = await getDoc(doc(db, "vendors", vendorId));

  if (!snap.exists()) {
    businessNameEl.textContent = "Vendor not found";
    return;
  }

  const v = snap.data();

  const name = v.businessName || "Vendor";
  const category = v.category || "";
  const about = v.bio || "";
  const image = v.profileImageUrl || "";

  businessNameEl.textContent = name;
  sidebarBusinessNameEl.textContent = name;
  vendorCategoryEl.textContent = category;
  vendorAboutEl.textContent = about;

  if (image) profilePicEl.src = image;

  if (v.website) {
    websiteBtn.href = v.website;
  } else {
    websiteBtn.style.display = "none";
  }

  if (v.email) {
    emailBtn.href = "mailto:" + v.email;
  } else {
    emailBtn.style.display = "none";
  }

  if (v.instagram) {
    instagramBtn.href = v.instagram;
  } else {
    instagramBtn.style.display = "none";
  }

  updateFavoriteButton(vendorId);
}

loadVendor();
</script>
