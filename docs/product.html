<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boutique Product | Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
 <style>
  :root {
    --ink:#1A1A16;
    --ink-mid:#4A4A44;
    --ink-muted:#8A8A82;
    --ink-ghost:#C0C0B8;
    --ink-rule:#DDDDD8;
    --cream:#FAFAF8;
    --cream-warm:#F4F0EA;
    --cream-deep:#EDE8E0;
    --gold:#9A7A5A;
    --gold-light:#C4A882;
    --font-serif:'Cormorant Garamond', Georgia, serif;
    --font-sans:'Plus Jakarta Sans','Helvetica Neue',Arial,sans-serif;
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}

  body{
    background:var(--cream);
    font-family:var(--font-sans);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }

  .site-topbar{
    background:var(--cream);
    border-bottom:1px solid var(--ink-rule);
    padding:0 36px;
    display:flex;
    align-items:center;
    gap:20px;
    min-height:64px;
    position:sticky;
    top:0;
    z-index:200;
  }

  .site-topbar-logo-wrap{
    display:inline-flex;
    align-items:center;
  }

  .site-topbar-logo{
    width:44px;
    height:44px;
    object-fit:contain;
  }

  .site-topbar-title{
    flex:1;
  }

  .site-topbar-title h1{
    margin:0;
    font-family:var(--font-serif);
    font-size:1.05rem;
    font-weight:400;
    letter-spacing:.01em;
    color:var(--ink);
  }

  .site-topbar-actions{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }

  .site-topbar-link,
  .site-topbar-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:34px;
    padding:6px 14px;
    font-family:var(--font-sans);
    font-size:.75rem;
    letter-spacing:.06em;
    text-decoration:none;
    white-space:nowrap;
    transition:all .2s ease;
  }

  .site-topbar-link{
    color:var(--ink-muted);
    border:none;
    background:none;
  }

  .site-topbar-link:hover{
    color:var(--ink);
  }

  .site-topbar-btn{
    background:var(--ink);
    color:var(--cream);
    font-weight:600;
    border:none;
    cursor:pointer;
  }

  .site-topbar-btn:hover{
    background:var(--ink-mid);
  }

  .product-page{
    max-width:1400px;
    margin:0 auto;
    padding:28px 36px 72px;
  }

  .product-back-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-bottom:24px;
    font-family:var(--font-sans);
    font-size:.72rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    text-decoration:none;
    color:var(--ink-muted);
    transition:color .2s;
  }

  .product-back-link:hover{
    color:var(--ink);
  }

  .product-card{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0;
    background:var(--cream);
    border:1px solid var(--ink-rule);
    overflow:hidden;
  }

  .product-image-wrap{
    position:relative;
    background:var(--cream-deep);
    min-height:720px;
    overflow:hidden;
  }

  .product-image{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:transform .7s ease;
  }

  .product-image-wrap:hover .product-image{
    transform:scale(1.03);
  }

  .product-content{
    padding:56px 48px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    border-left:1px solid var(--ink-rule);
  }

  .product-kicker{
    font-family:var(--font-sans);
    font-size:.68rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--ink-ghost);
    margin-bottom:16px;
  }

  .product-title{
    font-family:var(--font-serif);
    font-size:clamp(2.4rem,4vw,4rem);
    font-weight:300;
    line-height:.95;
    letter-spacing:-.04em;
    color:var(--ink);
    margin:0 0 18px;
  }

  .product-price{
    font-family:var(--font-serif);
    font-size:1.8rem;
    font-weight:400;
    color:var(--gold);
    margin:0 0 26px;
  }

  .product-text{
    font-family:var(--font-sans);
    font-size:.88rem;
    line-height:1.85;
    color:var(--ink-muted);
    margin-bottom:18px;
  }

  .product-text strong{
    color:var(--ink);
    font-weight:600;
  }

  .product-divider{
    width:100%;
    height:1px;
    background:var(--ink-rule);
    margin:24px 0;
  }

  .product-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:42px;
    padding:10px 22px;
    margin-top:12px;
    background:var(--ink);
    color:var(--cream);
    border:none;
    text-decoration:none;
    font-family:var(--font-sans);
    font-size:.72rem;
    font-weight:700;
    letter-spacing:.12em;
    text-transform:uppercase;
    transition:background .2s;
    width:fit-content;
  }

  .product-btn:hover{
    background:var(--ink-mid);
  }

  .vendor-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:24px;
    font-family:var(--font-sans);
    font-size:.72rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    text-decoration:none;
    color:var(--ink-muted);
    transition:color .2s;
  }

  .vendor-link:hover{
    color:var(--ink);
  }

  .loading-state,
  .error-state{
    padding:80px 24px;
    text-align:center;
    font-family:var(--font-serif);
    font-style:italic;
    font-size:1.2rem;
    color:var(--ink-muted);
  }

  @media(max-width:980px){

    .product-card{
      grid-template-columns:1fr;
    }

    .product-image-wrap{
      min-height:420px;
    }

    .product-content{
      border-left:none;
      border-top:1px solid var(--ink-rule);
    }
  }

  @media(max-width:700px){

    .site-topbar{
      padding:0 16px;
      min-height:56px;
    }

    .product-page{
      padding:20px 16px 56px;
    }

    .product-content{
      padding:32px 24px;
    }

    .product-image-wrap{
      min-height:320px;
    }

    .product-title{
      font-size:2.6rem;
    }
  }
</style>
</head>
<body>
  <header class="site-topbar">
  <a href="index.html" class="site-topbar-logo-wrap" aria-label="Go to homepage">
    <img src="images/logo1.png" alt="Our Wedding Day Hub" class="site-topbar-logo">
  </a>

  <div class="site-topbar-title">
    <h1>Our Wedding Day Hub</h1>
  </div>

  <nav class="site-topbar-actions">
    <a href="categories.html" class="site-topbar-link">Categories</a>
    <a href="shop.html" class="site-topbar-link">Boutique</a>

    <a href="messages.html" id="messagesLink" class="site-topbar-link" style="display:none; position:relative;">
      Messages
      <span id="msgNavBadge" style="display:none; position:absolute; top:-6px; right:-10px; background:linear-gradient(135deg,#d6b19a,#a97c66); color:#fffaf7; font-size:0.68rem; font-weight:700; padding:2px 6px; border-radius:999px; line-height:1.2; min-width:18px; text-align:center;">0</span>
    </a>

    <a href="login.html" id="loginLink" class="site-topbar-link">Log In</a>
    <a href="signup.html" id="joinLink" class="site-topbar-btn">Join</a>
    <a href="dashboard.html" id="dashboardLink" class="site-topbar-link" style="display:none;">Dashboard</a>
    <button id="logoutLink" class="site-topbar-btn" style="display:none;">Log Out</button>
  </nav>
</header>
  <main class="product-page">
    <a href="shop.html" class="product-back-link">← Back to Boutique</a>

    <section id="productWrap" class="product-card" style="margin-top:20px;">
      Loading product...
    </section>
  </main>

  <script type="module">
    import {
      db,
      doc,
      getDoc
    } from "./firebase.js";

    const productWrap = document.getElementById("productWrap");
    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");

    function money(value) {
      const number = Number(value || 0);
      return `$${number.toFixed(2)}`;
    }

    async function loadProduct() {
      if (!productId) {
        productWrap.innerHTML = "<p>Product not found.</p>";
        return;
      }

      try {
        const snap = await getDoc(doc(db, "boutiqueProducts", productId));

        if (!snap.exists()) {
          productWrap.innerHTML = "<p>Product not found.</p>";
          return;
        }

        const product = snap.data();

        const image = Array.isArray(product.images) && product.images.length
          ? product.images[0]
          : "images/logo1.png";

        const purchaseButton = product.purchaseLink
          ? `<a class="product-btn" href="${product.purchaseLink}" target="_blank" rel="noopener">Buy / Enquire</a>`
          : `<a class="product-btn" href="vendor.html?id=${product.vendorId}">Enquire with Vendor</a>`;

     productWrap.innerHTML = `
  <div class="product-image-wrap">
    <img class="product-image" src="${image}" alt="${product.name || "Boutique product"}">
  </div>

  <div class="product-content">

    <p class="product-kicker">Our Wedding Day Hub Boutique</p>

    <h1 class="product-title">${product.name || "Boutique Product"}</h1>

    <p class="product-price">${money(product.price)}</p>

    <p class="product-text">${product.description || ""}</p>

    <div class="product-divider"></div>

    <p class="product-text"><strong>Vendor:</strong> ${product.vendorName || "Wedding vendor"}</p>

    <p class="product-text"><strong>Delivery / collection:</strong> ${product.fulfilmentDetails || "Details arranged with vendor."}</p>

    <p class="product-text"><strong>Status:</strong> ${product.status || "live"}</p>

    ${purchaseButton}

    <a href="vendor.html?id=${product.vendorId}" class="vendor-link">
      View vendor profile →
    </a>

  </div>
`;
      } catch (error) {
        console.error(error);
        productWrap.innerHTML = "<p>There was a problem loading this product.</p>";
      }
    }

    loadProduct();
  </script>
</body>
</html>
