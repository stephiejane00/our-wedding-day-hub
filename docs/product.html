<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boutique Product | Our Wedding Day Hub</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background:#fffaf7; color:#3b2f2a; }
    .product-page { max-width:1100px; margin:0 auto; padding:32px 18px 70px; }
    .product-card { display:grid; grid-template-columns:1fr 1fr; gap:32px; background:#fff; border:1px solid #eadfd6; border-radius:28px; padding:24px; box-shadow:0 18px 45px rgba(59,47,42,.08); }
    .product-image { width:100%; border-radius:22px; object-fit:cover; background:#f4e7df; }
    .product-title { font-family:"Cormorant Garamond", serif; font-size:clamp(2.2rem,5vw,4rem); margin:0 0 10px; }
    .product-price { font-size:1.4rem; font-weight:800; margin:0 0 18px; }
    .product-text { color:#7d6d64; line-height:1.7; }
    .product-btn { display:inline-flex; margin-top:18px; padding:13px 22px; border-radius:999px; background:#3b2f2a; color:#fffaf7; text-decoration:none; font-weight:800; }
    .site-topbar {
  background: radial-gradient(circle at top left, rgba(200,166,161,0.18), transparent 34%),
    linear-gradient(135deg, #fffaf7, #f4ebe5);
  border-bottom: 1px solid rgba(223,210,200,0.9);
  box-shadow: 0 6px 24px rgba(59,47,42,0.08);
  padding: 0 34px;
  display: flex;
  align-items: center;
  gap: 20px;
  min-height: 72px;
  position: sticky;
  top: 0;
  z-index: 200;
  flex-wrap: wrap;
}

.site-topbar-logo-wrap {
  display: inline-flex;
  align-items: center;
}

.site-topbar-logo {
  width: 52px;
  height: 52px;
  object-fit: contain;
}

.site-topbar-title {
  flex: 1;
}

.site-topbar-title h1 {
  margin: 0;
  font-family: "Cormorant Garamond", serif;
  font-size: 1.15rem;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: #3b2f2a;
}

.site-topbar-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.site-topbar-link,
.site-topbar-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 38px;
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 0.8rem;
  text-decoration: none;
  white-space: nowrap;
}

.site-topbar-link {
  background: rgba(255,250,247,0.9);
  border: 1px solid rgba(223,210,200,0.9);
  color: #3b2f2a;
}

.site-topbar-btn {
  border: none;
  background: linear-gradient(135deg, #d6b19a, #a97c66);
  color: #fffaf7;
  font-weight: 700;
}

.site-topbar-link:hover,
.site-topbar-btn:hover {
  transform: translateY(-1px);
}

@media (max-width: 700px) {
  .site-topbar {
    padding: 12px 16px;
    gap: 14px;
    justify-content: center;
  }

  .site-topbar-logo {
    width: 42px;
    height: 42px;
  }

  .site-topbar-title {
    flex: unset;
  }

  .site-topbar-title h1 {
    font-size: 0.95rem;
    text-align: center;
  }

  .site-topbar-actions {
    width: 100%;
    justify-content: center;
    gap: 10px;
  }

  .site-topbar-link,
  .site-topbar-btn {
    min-height: 36px;
    padding: 6px 14px;
    font-size: 0.78rem;
  }
}
    @media (max-width:800px){ .product-card{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header class="site-topbar">
  <a href="index.html" class="site-topbar-logo-wrap" aria-label="Go to homepage">
    <img src="images/logo1.png" alt="Our Wedding Day Hub" class="site-topbar-logo">
  </a>

  <div class="site-topbar-title">
    <h1>Our Wedding Day Hub</h1>
  </div>

  <nav class="site-topbar-actions">
    <a href="categories.html" class="site-topbar-link">Categories</a>
    <a href="shop.html" class="site-topbar-link">Boutique</a>

    <a href="messages.html" id="messagesLink" class="site-topbar-link" style="display:none; position:relative;">
      Messages
      <span id="msgNavBadge" style="display:none; position:absolute; top:-6px; right:-10px; background:linear-gradient(135deg,#d6b19a,#a97c66); color:#fffaf7; font-size:0.68rem; font-weight:700; padding:2px 6px; border-radius:999px; line-height:1.2; min-width:18px; text-align:center;">0</span>
    </a>

    <a href="login.html" id="loginLink" class="site-topbar-link">Log In</a>
    <a href="signup.html" id="joinLink" class="site-topbar-btn">Join</a>
    <a href="dashboard.html" id="dashboardLink" class="site-topbar-link" style="display:none;">Dashboard</a>
    <button id="logoutLink" class="site-topbar-btn" style="display:none;">Log Out</button>
  </nav>
</header>
  <main class="product-page">
    <a href="shop.html" style="color:#7d6d64; text-decoration:none;">← Back to Boutique</a>

    <section id="productWrap" class="product-card" style="margin-top:20px;">
      Loading product...
    </section>
  </main>

  <script type="module">
    import {
      db,
      doc,
      getDoc
    } from "./firebase.js";

    const productWrap = document.getElementById("productWrap");
    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");

    function money(value) {
      const number = Number(value || 0);
      return `$${number.toFixed(2)}`;
    }

    async function loadProduct() {
      if (!productId) {
        productWrap.innerHTML = "<p>Product not found.</p>";
        return;
      }

      try {
        const snap = await getDoc(doc(db, "boutiqueProducts", productId));

        if (!snap.exists()) {
          productWrap.innerHTML = "<p>Product not found.</p>";
          return;
        }

        const product = snap.data();

        const image = Array.isArray(product.images) && product.images.length
          ? product.images[0]
          : "images/logo1.png";

        const purchaseButton = product.purchaseLink
          ? `<a class="product-btn" href="${product.purchaseLink}" target="_blank" rel="noopener">Buy / Enquire</a>`
          : `<a class="product-btn" href="vendor.html?id=${product.vendorId}">Enquire with Vendor</a>`;

        productWrap.innerHTML = `
          <div>
            <img class="product-image" src="${image}" alt="${product.name || "Boutique product"}">
          </div>

          <div>
            <p style="letter-spacing:.18em; text-transform:uppercase; color:#b08d7d; font-size:.78rem;">Our Wedding Day Hub Boutique</p>
            <h1 class="product-title">${product.name || "Boutique Product"}</h1>
            <p class="product-price">${money(product.price)}</p>

            <p class="product-text">${product.description || ""}</p>

            <p class="product-text"><strong>Vendor:</strong> ${product.vendorName || "Wedding vendor"}</p>
            <p class="product-text"><strong>Delivery / collection:</strong> ${product.fulfilmentDetails || "Details arranged with vendor."}</p>
            <p class="product-text"><strong>Status:</strong> ${product.status || "live"}</p>

            ${purchaseButton}

            <br><br>
            <a href="vendor.html?id=${product.vendorId}" style="color:#a97c66;">View vendor profile</a>
          </div>
        `;
      } catch (error) {
        console.error(error);
        productWrap.innerHTML = "<p>There was a problem loading this product.</p>";
      }
    }

    loadProduct();
  </script>
</body>
</html>
